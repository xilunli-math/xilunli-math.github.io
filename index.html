<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Student at Peking University</title>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4c3, #c5e1a5);
            font-family: Arial, sans-serif;
            transition: background 0.5s;
        }
        h1 {
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .content {
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        .content:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>About Me</h1>
        <p>I am a PhD student at Peking University, specializing in mathematics and computer science. My research focuses on algorithm optimization and machine learning applications.</p>
        <p>In addition to my academic work, I enjoy hiking and photography. You can reach me at my email: example@example.com.</p>
    </div>
</body>
</html>
