<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>宝物守卫塔防</title>
  <style>
    :root {
      --bg: #101827;
      --panel: #17233a;
      --panel-2: #21314f;
      --text: #f5f7fb;
      --muted: #b9c4d6;
      --accent: #ffd166;
      --danger: #ff5c7a;
      --good: #53d37f;
      --blue: #65d1ff;
      --line: rgba(255,255,255,0.12);
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #22385e 0%, var(--bg) 55%, #070b12 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 14px;
    }

    .app {
      width: min(1240px, 100%);
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    .game-card,
    .side-panel {
      background: rgba(23, 35, 58, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .game-card {
      padding: 12px;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #0c1320;
      border: 1px solid rgba(255,255,255,0.16);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: crosshair;
    }

    .overlay-hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    .side-panel {
      padding: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 20px;
      font-weight: 800;
    }

    .message {
      min-height: 38px;
      margin: 8px 0 12px;
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(255, 209, 102, 0.12);
      border: 1px solid rgba(255, 209, 102, 0.28);
      color: #ffe6a7;
      font-size: 13px;
      line-height: 1.35;
    }

    .section-title {
      margin: 14px 0 8px;
      color: #ffffff;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 46px;
      padding: 10px 12px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, #3b82f6, #245bc2);
      box-shadow: 0 5px 0 rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform .08s ease, filter .16s ease, opacity .16s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      filter: grayscale(.2);
      transform: none;
    }

    .btn-good { background: linear-gradient(180deg, #37c975, #15924c); }
    .btn-warn { background: linear-gradient(180deg, #ffbd45, #c67a06); }
    .btn-danger { background: linear-gradient(180deg, #ff6381, #ba2544); }
    .btn-muted { background: linear-gradient(180deg, #536178, #303a4d); }
    .btn-magnet { background: linear-gradient(180deg, #a671ff, #6530c5); }

    .tower-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .tower-button {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 9px;
      align-items: center;
      min-height: 58px;
      text-align: left;
      background: linear-gradient(180deg, #2b426b, #1c2b48);
    }

    .tower-button.active {
      outline: 2px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(255,209,102,0.16), 0 5px 0 rgba(0,0,0,0.25);
    }

    .tower-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.14);
      font-size: 17px;
      font-weight: 900;
    }

    .tower-main {
      min-width: 0;
    }

    .tower-name {
      font-size: 14px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tower-desc {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 600;
    }

    .tower-price {
      color: var(--accent);
      font-size: 14px;
      font-weight: 900;
    }

    .info-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .info-card strong {
      color: #fff;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: #fff;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .side-panel {
        padding: 12px;
      }

      h1 {
        font-size: 21px;
      }

      .button-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tower-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tower-button {
        grid-template-columns: 34px 1fr;
      }

      .tower-price {
        grid-column: 2;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat .value {
        font-size: 17px;
      }

      .tower-list {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 48px;
      }

      .overlay-hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game-card">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="gameCanvas" aria-label="塔防游戏画面"></canvas>
        <div class="overlay-hint">
          <span>点击空格放塔 / 点击已有塔查看信息</span>
          <span>怪物搬回宝物即失败</span>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <h1>宝物守卫塔防</h1>
      <p class="subtitle">守住右下角宝物。怪物碰到宝物会搬回左上角巢穴；吸铁石只能吸回已掉落的宝物。</p>

      <div class="stats">
        <div class="stat"><div class="label">等级</div><div class="value" id="levelText">1</div></div>
        <div class="stat"><div class="label">金币</div><div class="value" id="goldText">0</div></div>
        <div class="stat"><div class="label">历史最高</div><div class="value" id="bestLevelText">1</div></div>
        <div class="stat"><div class="label">时间</div><div class="value" id="timeText">00:00</div></div>
      </div>

      <div class="stat" style="margin-bottom: 10px;"><div class="label">状态</div><div class="value" id="statusText">未开始</div></div>
      <div class="message" id="messageText">选择“开始游戏”，然后购买并放置防御塔。</div>

      <div class="section-title">游戏控制</div>
      <div class="button-grid">
        <button id="startBtn" class="btn-good">开始游戏</button>
        <button id="pauseBtn" class="btn-warn">暂停游戏</button>
        <button id="resumeBtn" class="btn-good">继续游戏</button>
        <button id="restartBtn" class="btn-danger">重新开始</button>
        <button id="magnetBtn" class="btn-magnet">吸铁石</button>
        <button id="cancelBuildBtn" class="btn-muted">取消放置</button>
      </div>

      <div class="section-title">
        <span>购买防御塔</span>
        <span id="buildModeText" style="color: var(--accent); font-size: 12px;"></span>
      </div>
      <div class="tower-list" id="towerList"></div>

      <div class="section-title">选中防御塔</div>
      <div class="info-card" id="towerInfo">暂无选中防御塔。</div>
      <div style="margin-top: 8px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button id="upgradeBtn" class="btn-good" style="grid-column: 1 / -1;">升级防御塔</button>
        <button id="sellBtn" class="btn-danger">出售防御塔</button>
        <button id="clearSelectBtn" class="btn-muted">取消选择</button>
      </div>

      <div class="section-title">图例</div>
      <div class="legend">
        <span><i class="dot" style="background:#ff5c7a"></i>巢穴</span>
        <span><i class="dot" style="background:#ffd166"></i>宝物</span>
        <span><i class="dot" style="background:#65d1ff"></i>普通怪</span>
        <span><i class="dot" style="background:#b084ff"></i>精英怪</span>
        <span><i class="dot" style="background:#53d37f"></i>急行怪</span>
        <span><i class="dot" style="background:#ff9f43"></i>肉盾怪</span>
      </div>
    </aside>
  </main>

  <script>
    // =========================
    // 1. 全局配置：后续扩展优先改这里
    // =========================
    const GAME_CONFIG = {
      gridRows: 10,
      gridCols: 10,
      cellSize: 80,

      // 初始金币为 null 时，会自动使用“两个普通塔”的价格。
      initialGold: null,
      levelDuration: 45,
      magnetCost: 45,
      // 宝物掉落后的保护时间：期间怪物会靠近宝物，但不能立刻再次拾取。
      treasureDropProtectionDuration: 2.2,
      treasureDropProtectionRadius: 56,
      // Boss 每隔多少级出现一次。Boss 不参与普通刷新表，而是在升级时单独生成。
      bossEveryLevels: 5,
      localStorageKey: "treasure_td_best_level_v1",

      monsterRadius: 15,
      treasureRadius: 16,
      treasurePickupRadius: 24,
      nestReturnRadius: 28,
      trapTriggerRadius: 30,

      maxMonsters: 180,
      spawnIntervalReductionPerLevel: 0.07,
      minSpawnIntervalFactor: 0.38,
      monsterHpGrowthPerLevel: 0.12,

      targetVectorWeight: 1.0,
      towerAvoidWeight: 0.38,
      towerAvoidRadius: 135,

      messageDuration: 2.6,
      laserWidth: 3,
      worldPadding: 0
    };

    const MONSTER_TYPES = {
      normal: {
        name: "普通怪",
        hp: 100,
        speed: 52,
        reward: 10,
        spawnInterval: 5,
        unlockLevel: 1,
        icon: "circle",
        color: "#65d1ff"
      },
      elite: {
        name: "精英怪",
        // 精英怪血量保持为普通怪的 1.5 倍，降低早期难度。
        hp: 150,
        speed: 44,
        reward: 30,
        // 刷新间隔比原先更长，避免精英怪过早堆积。
        spawnInterval: 30,
        unlockLevel: 1,
        icon: "diamond",
        color: "#b084ff"
      },
      runner: {
        name: "急行怪",
        hp: 72,
        speed: 94,
        reward: 15,
        spawnInterval: 8,
        unlockLevel: 4,
        icon: "triangle",
        color: "#53d37f"
      },
      tank: {
        name: "肉盾怪",
        hp: 640,
        speed: 32,
        reward: 55,
        spawnInterval: 18,
        unlockLevel: 4,
        icon: "square",
        color: "#ff9f43"
      },
      boss: {
        name: "Boss 怪",
        hp: 1800,
        speed: 30,
        reward: 180,
        // Boss 由等级事件触发，不参与普通按秒刷新。
        spawnInterval: Infinity,
        unlockLevel: Infinity,
        icon: "boss",
        color: "#ff4d6d",
        isBoss: true,
        sizeMultiplier: 1.7,
        carrySpeedMultiplier: 0.55,
        trapDamageTaken: 460
      }
    };

    const TOWER_TYPES = {
      normal: {
        name: "普通塔",
        damagePerSecond: 28,
        range: 130,
        price: 50,
        sellPrice: 25,
        isAoe: false,
        aoeRadius: 0,
        slowMultiplier: 1,
        icon: "N",
        color: "#69d2ff",
        description: "均衡输出",
        upgrade: {
          maxLevel: 3,
          baseCost: 45,
          costGrowth: 1.45,
          damageMultiplierPerLevel: 1.35,
          rangeBonusPerLevel: 8
        }
      },
      slow: {
        name: "减速塔",
        damagePerSecond: 12,
        range: 120,
        price: 65,
        sellPrice: 32,
        isAoe: false,
        aoeRadius: 0,
        slowMultiplier: 0.6,
        icon: "S",
        color: "#85f0c6",
        description: "减速 60%",
        upgrade: {
          maxLevel: 3,
          baseCost: 55,
          costGrowth: 1.45,
          damageMultiplierPerLevel: 1.25,
          rangeBonusPerLevel: 7,
          slowImprovementPerLevel: 0.05,
          minSlowMultiplier: 0.45
        }
      },
      sniper: {
        name: "远程塔",
        damagePerSecond: 34,
        range: 205,
        price: 85,
        sellPrice: 42,
        isAoe: false,
        aoeRadius: 0,
        slowMultiplier: 1,
        icon: "R",
        color: "#9ec5ff",
        description: "长射程",
        upgrade: {
          maxLevel: 3,
          baseCost: 75,
          costGrowth: 1.45,
          damageMultiplierPerLevel: 1.30,
          rangeBonusPerLevel: 18
        }
      },
      aoe: {
        name: "AOE 塔",
        damagePerSecond: 20,
        range: 145,
        price: 110,
        sellPrice: 55,
        isAoe: true,
        aoeRadius: 70,
        slowMultiplier: 1,
        icon: "A",
        color: "#ffd166",
        description: "范围伤害",
        upgrade: {
          maxLevel: 3,
          baseCost: 95,
          costGrowth: 1.45,
          damageMultiplierPerLevel: 1.25,
          rangeBonusPerLevel: 8,
          aoeRadiusBonusPerLevel: 12
        }
      },
      lure: {
        name: "诱捕塔",
        damagePerSecond: 0,
        range: 0,
        price: 70,
        sellPrice: 0,
        isAoe: false,
        aoeRadius: 0,
        slowMultiplier: 1,
        icon: "★",
        color: "#ff75d8",
        description: "诱导并同归于尽",
        isTrap: true,
        lureRange: 360,
        trapExplosionRadius: 70,
        trapExplosionDamage: 120,
        upgrade: {
          maxLevel: 3,
          baseCost: 60,
          costGrowth: 1.35,
          lureRangeBonusPerLevel: 150,
          trapExplosionRadiusBonusPerLevel: 28,
          trapExplosionDamageBonusPerLevel: 90
        }
      }
    };

    const GAME_STATUS = {
      NOT_STARTED: "not_started",
      RUNNING: "running",
      PAUSED: "paused",
      FAILED: "failed"
    };

    const STATUS_TEXT = {
      [GAME_STATUS.NOT_STARTED]: "未开始",
      [GAME_STATUS.RUNNING]: "运行中",
      [GAME_STATUS.PAUSED]: "暂停中",
      [GAME_STATUS.FAILED]: "游戏失败"
    };

    // =========================
    // 2. 工具函数
    // =========================
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function distanceXY(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }

    function normalize(x, y) {
      const len = Math.hypot(x, y);
      if (len <= 0.00001) return { x: 0, y: 0 };
      return { x: x / len, y: y / len };
    }

    function formatTime(seconds) {
      const s = Math.floor(seconds);
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function round1(value) {
      return Math.round(value * 10) / 10;
    }

    // =========================
    // 3. 宝物
    // =========================
    class Treasure {
      constructor(game) {
        this.game = game;
        this.reset();
      }

      get origin() {
        return this.game.cellCenter(GAME_CONFIG.gridCols - 1, GAME_CONFIG.gridRows - 1);
      }

      reset() {
        const origin = this.origin;
        this.x = origin.x;
        this.y = origin.y;
        this.carrier = null;
        this.state = "home"; // home | dropped | carried
        this.protectionTimer = 0;
      }

      attachTo(monster) {
        this.carrier = monster;
        this.state = "carried";
        this.protectionTimer = 0;
        this.update(0);
      }

      dropAt(x, y) {
        this.carrier = null;
        this.x = clamp(x, GAME_CONFIG.treasureRadius, this.game.worldWidth - GAME_CONFIG.treasureRadius);
        this.y = clamp(y, GAME_CONFIG.treasureRadius, this.game.worldHeight - GAME_CONFIG.treasureRadius);
        this.state = "dropped";
        this.protectionTimer = GAME_CONFIG.treasureDropProtectionDuration;
      }

      magnetBack() {
        // 吸铁石只允许吸回“掉落在地上”的宝物，不能从怪物手里直接抢回。
        if (this.state !== "dropped" || this.carrier) return false;
        this.reset();
        return true;
      }

      update(dt) {
        if (this.carrier) {
          this.x = this.carrier.x;
          this.y = this.carrier.y;
          return;
        }
        if (this.protectionTimer > 0) {
          this.protectionTimer = Math.max(0, this.protectionTimer - dt);
        }
      }

      canBePickedUp() {
        return !this.carrier && this.protectionTimer <= 0;
      }

      isAtOrigin() {
        const origin = this.origin;
        return !this.carrier && distanceXY(this.x, this.y, origin.x, origin.y) < 1 && this.state === "home";
      }

      draw(ctx) {
        if (this.carrier) return;

        if (this.state === "dropped" && this.protectionTimer > 0) {
          const ratio = this.protectionTimer / GAME_CONFIG.treasureDropProtectionDuration;
          const radius = GAME_CONFIG.treasureDropProtectionRadius * (0.82 + 0.18 * Math.sin(performance.now() / 120));
          ctx.save();
          ctx.globalAlpha = 0.22 + ratio * 0.18;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.65;
          ctx.strokeStyle = "#fff1a8";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = "#fff8dc";
          ctx.font = "900 13px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`${this.protectionTimer.toFixed(1)}s`, this.x, this.y + 34);
          ctx.restore();
        }

        drawTreasureShape(ctx, this.x, this.y, GAME_CONFIG.treasureRadius, this.state === "dropped");
      }
    }
    // =========================
    // 4. 怪物
    // =========================
    class Monster {
      constructor(game, typeKey) {
        this.game = game;
        this.typeKey = typeKey;
        this.config = MONSTER_TYPES[typeKey];

        const levelBonus = 1 + (game.level - 1) * GAME_CONFIG.monsterHpGrowthPerLevel;
        this.maxHp = Math.round(this.config.hp * levelBonus);
        this.hp = this.maxHp;
        this.speed = this.config.speed;
        this.reward = this.config.reward;
        this.radius = GAME_CONFIG.monsterRadius * (this.config.sizeMultiplier || 1);

        const spawn = game.nestPosition;
        const jitter = GAME_CONFIG.cellSize * 0.12;
        this.x = spawn.x + (Math.random() - 0.5) * jitter;
        this.y = spawn.y + (Math.random() - 0.5) * jitter;
        this.carryingTreasure = false;
        this.slowMultiplier = 1;
        this.isSlowed = false;
        this.alive = true;
        this.currentTarget = { x: this.x, y: this.y, kind: "none" };
      }

      beginFrame() {
        this.slowMultiplier = 1;
        this.isSlowed = false;
      }

      applySlow(multiplier) {
        if (multiplier < this.slowMultiplier) {
          this.slowMultiplier = multiplier;
          this.isSlowed = true;
        }
      }

      takeDamage(amount) {
        if (!this.alive) return;
        this.hp -= amount;
        if (this.hp <= 0) {
          this.die();
        }
      }

      die(options = {}) {
        if (!this.alive) return;
        this.alive = false;
        if (this.carryingTreasure) {
          this.carryingTreasure = false;
          this.game.treasure.dropAt(this.x, this.y);
          this.game.showMessage("搬运宝物的怪物被击杀，宝物掉落并获得短暂保护！");
        }
        if (!options.noReward) {
          this.game.gold += this.reward;
          const goldText = this.config.isBoss ? `Boss +${this.reward}` : `+${this.reward}`;
          this.game.spawnFloatingText(goldText, this.x, this.y - this.radius - 8, "#ffd166", this.config.isBoss ? 1.45 : 1);
        }
      }

      update(dt) {
        if (!this.alive) return;

        const target = this.game.getTargetForMonster(this);
        this.currentTarget = target;

        const toTarget = normalize(target.x - this.x, target.y - this.y);
        let avoidX = 0;
        let avoidY = 0;

        for (const tower of this.game.towers) {
          if (target.kind === "trap" && target.tower === tower) continue;
          const d = distanceXY(this.x, this.y, tower.x, tower.y);
          if (d > 0.001 && d < GAME_CONFIG.towerAvoidRadius) {
            const strength = (GAME_CONFIG.towerAvoidRadius - d) / GAME_CONFIG.towerAvoidRadius;
            avoidX += (this.x - tower.x) / d * strength;
            avoidY += (this.y - tower.y) / d * strength;
          }
        }

        const avoid = normalize(avoidX, avoidY);
        const finalDir = normalize(
          toTarget.x * GAME_CONFIG.targetVectorWeight + avoid.x * GAME_CONFIG.towerAvoidWeight,
          toTarget.y * GAME_CONFIG.targetVectorWeight + avoid.y * GAME_CONFIG.towerAvoidWeight
        );

        const carryFactor = this.carryingTreasure ? (this.config.carrySpeedMultiplier || 1) : 1;
        const moveDistance = this.speed * this.slowMultiplier * carryFactor * dt;
        this.x += finalDir.x * moveDistance;
        this.y += finalDir.y * moveDistance;

        const r = this.radius;
        this.x = clamp(this.x, r, this.game.worldWidth - r);
        this.y = clamp(this.y, r, this.game.worldHeight - r);

        this.handleObjectiveCollision(target);
      }

      handleObjectiveCollision(target) {
        if (!this.alive) return;

        if (this.carryingTreasure) {
          const nest = this.game.nestPosition;
          if (distanceXY(this.x, this.y, nest.x, nest.y) <= GAME_CONFIG.nestReturnRadius + this.radius * 0.35) {
            this.game.failGame("怪物成功把宝物搬回巢穴！");
          }
          return;
        }

        if (target.kind === "trap" && target.tower) {
          const d = distanceXY(this.x, this.y, target.tower.x, target.tower.y);
          if (d <= GAME_CONFIG.trapTriggerRadius + this.radius * 0.25) {
            this.game.triggerTrap(target.tower, this);
          }
          return;
        }

        const treasure = this.game.treasure;
        if (treasure.canBePickedUp() && distanceXY(this.x, this.y, treasure.x, treasure.y) <= GAME_CONFIG.treasurePickupRadius + this.radius * 0.25) {
          this.carryingTreasure = true;
          treasure.attachTo(this);
          this.game.showMessage(`${this.config.name} 搬起了宝物，正在返回巢穴！`);
        }
      }

      draw(ctx) {
        if (!this.alive) return;
        const r = this.radius;
        ctx.save();
        ctx.translate(this.x, this.y);

        ctx.shadowColor = this.config.isBoss ? "rgba(255,77,109,0.55)" : "rgba(0,0,0,0.35)";
        ctx.shadowBlur = this.config.isBoss ? 14 : 6;
        ctx.fillStyle = this.config.color;
        ctx.strokeStyle = this.config.isBoss ? "#ffe6ee" : "rgba(255,255,255,0.85)";
        ctx.lineWidth = this.config.isBoss ? 3 : 2;

        if (this.config.icon === "boss") {
          ctx.beginPath();
          for (let i = 0; i < 12; i++) {
            const angle = -Math.PI / 2 + i * Math.PI / 6;
            const rr = i % 2 === 0 ? r + 8 : r * 0.78;
            const px = Math.cos(angle) * rr;
            const py = Math.sin(angle) * rr;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.font = "900 18px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("B", 0, 1);
        } else if (this.config.icon === "diamond") {
          ctx.beginPath();
          ctx.moveTo(0, -r - 2);
          ctx.lineTo(r + 2, 0);
          ctx.lineTo(0, r + 2);
          ctx.lineTo(-r - 2, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (this.config.icon === "triangle") {
          ctx.beginPath();
          ctx.moveTo(0, -r - 4);
          ctx.lineTo(r + 4, r + 2);
          ctx.lineTo(-r - 4, r + 2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (this.config.icon === "square") {
          ctx.beginPath();
          ctx.roundRect(-r - 2, -r - 2, (r + 2) * 2, (r + 2) * 2, 5);
          ctx.fill();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        if (this.isSlowed) {
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(134, 240, 198, 0.95)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, r + 7, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (this.carryingTreasure) {
          drawTreasureShape(ctx, 0, -r - 18, 10, false);
        }

        ctx.restore();

        this.drawHpBar(ctx);
      }

      drawHpBar(ctx) {
        const w = this.config.isBoss ? 66 : 38;
        const h = this.config.isBoss ? 7 : 5;
        const pct = clamp(this.hp / this.maxHp, 0, 1);
        const x = this.x - w / 2;
        const y = this.y - this.radius - 18;
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = pct > 0.5 ? "#53d37f" : pct > 0.25 ? "#ffd166" : "#ff5c7a";
        ctx.fillRect(x, y, w * pct, h);
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.strokeRect(x, y, w, h);
        ctx.restore();
      }
    }
    // =========================
    // 5. 防御塔
    // =========================
    class Tower {
      constructor(game, typeKey, col, row) {
        this.game = game;
        this.typeKey = typeKey;
        this.config = TOWER_TYPES[typeKey];
        this.col = col;
        this.row = row;
        const center = game.cellCenter(col, row);
        this.x = center.x;
        this.y = center.y;
        this.level = 1;
        this.upgradeSpent = 0;
        this.lastTarget = null;
        this.lastAoe = null;
        this.lastExplosion = null;
        this.pulse = Math.random() * Math.PI * 2;
      }

      get isTrap() {
        return Boolean(this.config.isTrap);
      }

      get upgradeConfig() {
        return this.config.upgrade || { maxLevel: 1 };
      }

      get maxLevel() {
        return this.upgradeConfig.maxLevel || 1;
      }

      get levelIndex() {
        return this.level - 1;
      }

      getDamagePerSecond() {
        const mult = this.upgradeConfig.damageMultiplierPerLevel || 1;
        return this.config.damagePerSecond * Math.pow(mult, this.levelIndex);
      }

      getRange() {
        return this.config.range + (this.upgradeConfig.rangeBonusPerLevel || 0) * this.levelIndex;
      }

      getAoeRadius() {
        return this.config.aoeRadius + (this.upgradeConfig.aoeRadiusBonusPerLevel || 0) * this.levelIndex;
      }

      getSlowMultiplier() {
        const slow = this.config.slowMultiplier - (this.upgradeConfig.slowImprovementPerLevel || 0) * this.levelIndex;
        return clamp(slow, this.upgradeConfig.minSlowMultiplier ?? 0.1, 1);
      }

      getLureRange() {
        const base = this.config.lureRange ?? Infinity;
        return base + (this.upgradeConfig.lureRangeBonusPerLevel || 0) * this.levelIndex;
      }

      getTrapExplosionRadius() {
        return (this.config.trapExplosionRadius || 0) + (this.upgradeConfig.trapExplosionRadiusBonusPerLevel || 0) * this.levelIndex;
      }

      getTrapExplosionDamage() {
        return (this.config.trapExplosionDamage || 0) + (this.upgradeConfig.trapExplosionDamageBonusPerLevel || 0) * this.levelIndex;
      }

      getUpgradeCost() {
        if (this.level >= this.maxLevel) return 0;
        const base = this.upgradeConfig.baseCost ?? Math.round(this.config.price * 0.75);
        const growth = this.upgradeConfig.costGrowth ?? 1.45;
        return Math.round(base * Math.pow(growth, this.levelIndex));
      }

      getSellPrice() {
        return Math.round(this.config.sellPrice + this.upgradeSpent * 0.55);
      }

      canUpgrade() {
        return this.level < this.maxLevel;
      }

      upgrade() {
        if (!this.canUpgrade()) return false;
        const cost = this.getUpgradeCost();
        if (this.game.gold < cost) return false;
        this.game.gold -= cost;
        this.upgradeSpent += cost;
        this.level += 1;
        return true;
      }

      update(dt) {
        this.pulse += dt * 4;
        this.lastTarget = null;
        this.lastAoe = null;
        this.lastExplosion = null;

        if (this.isTrap) return;

        const target = this.findNearestMonster();
        if (!target) return;

        const damage = this.getDamagePerSecond();
        const slow = this.getSlowMultiplier();
        this.lastTarget = target;
        if (this.config.isAoe) {
          const aoeRadius = this.getAoeRadius();
          this.lastAoe = { x: target.x, y: target.y, radius: aoeRadius };
          for (const monster of this.game.monsters) {
            if (!monster.alive) continue;
            if (distanceXY(monster.x, monster.y, target.x, target.y) <= aoeRadius + monster.radius * 0.25) {
              monster.takeDamage(damage * dt);
              if (slow < 1) monster.applySlow(slow);
            }
          }
        } else {
          target.takeDamage(damage * dt);
          if (slow < 1) target.applySlow(slow);
        }
      }

      findNearestMonster() {
        let best = null;
        let bestDistance = Infinity;
        const range = this.getRange();
        for (const monster of this.game.monsters) {
          if (!monster.alive) continue;
          const d = distanceXY(this.x, this.y, monster.x, monster.y);
          if (d <= range + monster.radius * 0.25 && d < bestDistance) {
            best = monster;
            bestDistance = d;
          }
        }
        return best;
      }

      drawLaser(ctx) {
        if (!this.lastTarget || !this.lastTarget.alive || this.isTrap) return;
        ctx.save();
        ctx.globalAlpha = 0.88;
        ctx.strokeStyle = this.config.isAoe ? "#ffd166" : (this.getSlowMultiplier() < 1 ? "#85f0c6" : "#ffefff");
        ctx.lineWidth = GAME_CONFIG.laserWidth + (this.level - 1) * 0.5;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.lastTarget.x, this.lastTarget.y);
        ctx.stroke();

        if (this.lastAoe) {
          ctx.globalAlpha = 0.26;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.72;
          ctx.strokeStyle = "#ffd166";
          ctx.lineWidth = 2;
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      draw(ctx, selected = false) {
        const r = GAME_CONFIG.cellSize * 0.28;
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.isTrap) {
          const pulseR = r + Math.sin(this.pulse) * 4;
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = this.config.color;
          ctx.beginPath();
          ctx.arc(0, 0, pulseR + 18 + this.levelIndex * 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = 8;
        ctx.fillStyle = this.config.color;
        ctx.strokeStyle = selected ? "#fff" : "rgba(255,255,255,0.72)";
        ctx.lineWidth = selected ? 4 : 2;

        ctx.beginPath();
        if (this.config.isAoe) {
          for (let i = 0; i < 6; i++) {
            const angle = Math.PI / 6 + i * Math.PI / 3;
            const px = Math.cos(angle) * (r + 4);
            const py = Math.sin(angle) * (r + 4);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
        } else if (this.isTrap) {
          for (let i = 0; i < 5; i++) {
            const outer = -Math.PI / 2 + i * Math.PI * 2 / 5;
            const inner = outer + Math.PI / 5;
            const ox = Math.cos(outer) * (r + 7);
            const oy = Math.sin(outer) * (r + 7);
            const ix = Math.cos(inner) * (r * 0.45);
            const iy = Math.sin(inner) * (r * 0.45);
            if (i === 0) ctx.moveTo(ox, oy);
            else ctx.lineTo(ox, oy);
            ctx.lineTo(ix, iy);
          }
          ctx.closePath();
        } else {
          ctx.arc(0, 0, r, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#102034";
        ctx.font = "900 18px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.config.icon, 0, 1);

        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.font = "900 11px system-ui, sans-serif";
        ctx.fillText(`Lv.${this.level}`, 0, r + 14);

        ctx.restore();

        if (selected) {
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = this.config.color;
          ctx.beginPath();
          const selectedRadius = this.isTrap ? this.getLureRange() : this.getRange();
          ctx.arc(this.x, this.y, selectedRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.65;
          ctx.strokeStyle = this.config.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y, selectedRadius, 0, Math.PI * 2);
          ctx.stroke();
          if (this.isTrap && this.getTrapExplosionRadius() > 0) {
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = "#ffd166";
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.getTrapExplosionRadius(), 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
      }
    }

    class UIManager {
      constructor(game) {
        this.game = game;
        this.els = {
          canvasWrap: document.getElementById("canvasWrap"),
          levelText: document.getElementById("levelText"),
          goldText: document.getElementById("goldText"),
          bestLevelText: document.getElementById("bestLevelText"),
          timeText: document.getElementById("timeText"),
          statusText: document.getElementById("statusText"),
          messageText: document.getElementById("messageText"),
          startBtn: document.getElementById("startBtn"),
          pauseBtn: document.getElementById("pauseBtn"),
          resumeBtn: document.getElementById("resumeBtn"),
          restartBtn: document.getElementById("restartBtn"),
          magnetBtn: document.getElementById("magnetBtn"),
          cancelBuildBtn: document.getElementById("cancelBuildBtn"),
          towerList: document.getElementById("towerList"),
          buildModeText: document.getElementById("buildModeText"),
          towerInfo: document.getElementById("towerInfo"),
          upgradeBtn: document.getElementById("upgradeBtn"),
          sellBtn: document.getElementById("sellBtn"),
          clearSelectBtn: document.getElementById("clearSelectBtn")
        };

        this.towerButtons = new Map();
        this.createTowerButtons();
        this.bindEvents();
      }

      createTowerButtons() {
        this.els.towerList.innerHTML = "";
        for (const [key, cfg] of Object.entries(TOWER_TYPES)) {
          const btn = document.createElement("button");
          btn.className = "tower-button";
          btn.type = "button";
          btn.dataset.towerKey = key;
          btn.innerHTML = `
            <span class="tower-icon" style="color:${cfg.color}">${cfg.icon}</span>
            <span class="tower-main">
              <span class="tower-name">${cfg.name}</span>
              <span class="tower-desc">${cfg.description} · 伤害 ${cfg.damagePerSecond}/s · 射程 ${cfg.range}</span>
            </span>
            <span class="tower-price">${cfg.price} 金</span>
          `;
          btn.addEventListener("click", () => this.game.enterBuildMode(key));
          this.els.towerList.appendChild(btn);
          this.towerButtons.set(key, btn);
        }
      }

      bindEvents() {
        this.els.startBtn.addEventListener("click", () => this.game.start());
        this.els.pauseBtn.addEventListener("click", () => this.game.pause());
        this.els.resumeBtn.addEventListener("click", () => this.game.resume());
        this.els.restartBtn.addEventListener("click", () => this.game.restart(true));
        this.els.magnetBtn.addEventListener("click", () => this.game.useMagnet());
        this.els.cancelBuildBtn.addEventListener("click", () => this.game.exitBuildMode());
        this.els.upgradeBtn.addEventListener("click", () => this.game.upgradeSelectedTower());
        this.els.sellBtn.addEventListener("click", () => this.game.sellSelectedTower());
        this.els.clearSelectBtn.addEventListener("click", () => this.game.clearSelectedTower());
      }

      update() {
        const g = this.game;
        this.els.levelText.textContent = g.level;
        this.els.goldText.textContent = Math.floor(g.gold);
        this.els.bestLevelText.textContent = g.bestLevel;
        this.els.timeText.textContent = formatTime(g.gameTime);
        this.els.statusText.textContent = STATUS_TEXT[g.status];
        this.els.messageText.textContent = g.message;
        this.els.buildModeText.textContent = g.buildModeTowerKey ? `正在放置：${TOWER_TYPES[g.buildModeTowerKey].name}` : "";

        this.els.startBtn.disabled = g.status !== GAME_STATUS.NOT_STARTED;
        this.els.pauseBtn.disabled = g.status !== GAME_STATUS.RUNNING;
        this.els.resumeBtn.disabled = g.status !== GAME_STATUS.PAUSED;
        this.els.magnetBtn.textContent = `吸铁石（${GAME_CONFIG.magnetCost} 金）`;
        this.els.magnetBtn.disabled = g.status === GAME_STATUS.FAILED || g.gold < GAME_CONFIG.magnetCost || g.treasure.state !== "dropped";
        this.els.cancelBuildBtn.disabled = !g.buildModeTowerKey;
        this.els.clearSelectBtn.disabled = !g.selectedTower;

        const selected = g.selectedTower;
        const upgradeCost = selected ? selected.getUpgradeCost() : 0;
        this.els.upgradeBtn.textContent = selected && selected.canUpgrade()
          ? `升级防御塔（${upgradeCost} 金）`
          : "升级防御塔";
        this.els.upgradeBtn.disabled = !selected || !selected.canUpgrade() || g.gold < upgradeCost || g.status === GAME_STATUS.FAILED;
        this.els.sellBtn.disabled = !selected;

        for (const [key, btn] of this.towerButtons.entries()) {
          btn.classList.toggle("active", g.buildModeTowerKey === key);
          btn.disabled = g.status === GAME_STATUS.FAILED || g.gold < TOWER_TYPES[key].price;
        }

        this.updateTowerInfo();
      }

      updateTowerInfo() {
        const tower = this.game.selectedTower;
        if (!tower) {
          this.els.towerInfo.textContent = "暂无选中防御塔。点击画面中的防御塔可查看信息。";
          return;
        }
        const c = tower.config;
        const nextCost = tower.getUpgradeCost();
        const nextText = tower.canUpgrade() ? `下一级费用：${nextCost} 金` : "已满级";
        const trapExtra = tower.isTrap
          ? `<br>诱导范围：${Math.round(tower.getLureRange())}<br>爆炸半径：${Math.round(tower.getTrapExplosionRadius())}　爆炸伤害：${Math.round(tower.getTrapExplosionDamage())}`
          : "";
        this.els.towerInfo.innerHTML = `
          <strong>${c.name} Lv.${tower.level}/${tower.maxLevel}</strong><br>
          位置：第 ${tower.row + 1} 行，第 ${tower.col + 1} 列<br>
          秒伤：${round1(tower.getDamagePerSecond())}　射程：${Math.round(tower.getRange())}<br>
          AOE：${c.isAoe ? `是，半径 ${Math.round(tower.getAoeRadius())}` : "否"}<br>
          减速：${tower.getSlowMultiplier() < 1 ? `${Math.round(tower.getSlowMultiplier() * 100)}%` : "无"}${trapExtra}<br>
          ${nextText}<br>
          出售价格：${tower.getSellPrice()} 金
        `;
      }
    }
    // =========================
    // 7. 游戏主类
    // =========================
    class Game {
      constructor() {
        this.canvas = document.getElementById("gameCanvas");
        this.ctx = this.canvas.getContext("2d");

        this.worldWidth = GAME_CONFIG.gridCols * GAME_CONFIG.cellSize;
        this.worldHeight = GAME_CONFIG.gridRows * GAME_CONFIG.cellSize;
        document.getElementById("canvasWrap").style.aspectRatio = `${GAME_CONFIG.gridCols} / ${GAME_CONFIG.gridRows}`;

        this.nestPosition = this.cellCenter(0, 0);
        this.bestLevel = Number(localStorage.getItem(GAME_CONFIG.localStorageKey) || 1);
        this.ui = new UIManager(this);

        this.lastTimestamp = 0;
        this.resizeObserver = null;
        this.pointer = { x: 0, y: 0, active: false };

        this.resetState();
        this.bindCanvasEvents();
        this.bindResize();
        this.resizeCanvas();
        this.loop(0);
      }

      resetState() {
        this.status = GAME_STATUS.NOT_STARTED;
        this.gameTime = 0;
        this.level = 1;
        this.gold = GAME_CONFIG.initialGold ?? TOWER_TYPES.normal.price * 2;
        this.monsters = [];
        this.towers = [];
        this.floatingTexts = [];
        this.treasure = new Treasure(this);
        this.spawnTimers = {};
        for (const key of Object.keys(MONSTER_TYPES)) this.spawnTimers[key] = 0;
        this.spawnedBossLevels = new Set();
        this.buildModeTowerKey = null;
        this.selectedTower = null;
        this.message = "选择“开始游戏”，然后购买并放置防御塔。";
        this.messageTimer = 0;
      }

      bindResize() {
        this.resizeObserver = new ResizeObserver(() => this.resizeCanvas());
        this.resizeObserver.observe(this.canvas);
        window.addEventListener("resize", () => this.resizeCanvas());
      }

      resizeCanvas() {
        const rect = this.canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        const width = Math.max(1, Math.round(rect.width * dpr));
        const height = Math.max(1, Math.round(rect.height * dpr));
        if (this.canvas.width !== width || this.canvas.height !== height) {
          this.canvas.width = width;
          this.canvas.height = height;
        }
        this.ctx.setTransform(width / this.worldWidth, 0, 0, height / this.worldHeight, 0, 0);
      }

      bindCanvasEvents() {
        this.canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          const point = this.clientToWorld(event.clientX, event.clientY);
          this.pointer = { ...point, active: true };
          this.handleCanvasClick(point.x, point.y);
        }, { passive: false });

        this.canvas.addEventListener("pointermove", (event) => {
          const point = this.clientToWorld(event.clientX, event.clientY);
          this.pointer = { ...point, active: true };
        });

        this.canvas.addEventListener("pointerleave", () => {
          this.pointer.active = false;
        });
      }

      clientToWorld(clientX, clientY) {
        const rect = this.canvas.getBoundingClientRect();
        return {
          x: clamp((clientX - rect.left) / rect.width * this.worldWidth, 0, this.worldWidth),
          y: clamp((clientY - rect.top) / rect.height * this.worldHeight, 0, this.worldHeight)
        };
      }

      cellCenter(col, row) {
        return {
          x: (col + 0.5) * GAME_CONFIG.cellSize,
          y: (row + 0.5) * GAME_CONFIG.cellSize
        };
      }

      pointToCell(x, y) {
        return {
          col: clamp(Math.floor(x / GAME_CONFIG.cellSize), 0, GAME_CONFIG.gridCols - 1),
          row: clamp(Math.floor(y / GAME_CONFIG.cellSize), 0, GAME_CONFIG.gridRows - 1)
        };
      }

      start() {
        if (this.status !== GAME_STATUS.NOT_STARTED) return;
        this.status = GAME_STATUS.RUNNING;
        this.showMessage("游戏开始！怪物会从左上角巢穴出现。", true);
      }

      pause() {
        if (this.status !== GAME_STATUS.RUNNING) return;
        this.status = GAME_STATUS.PAUSED;
        this.showMessage("游戏已暂停。", true);
      }

      resume() {
        if (this.status !== GAME_STATUS.PAUSED) return;
        this.status = GAME_STATUS.RUNNING;
        this.showMessage("游戏继续。", true);
      }

      restart(startImmediately = false) {
        this.resetState();
        if (startImmediately) this.start();
      }

      failGame(reason) {
        if (this.status === GAME_STATUS.FAILED) return;
        this.status = GAME_STATUS.FAILED;
        this.exitBuildMode();
        this.updateBestLevel();
        this.showMessage(`${reason} 最终等级：${this.level}。点击“重新开始”再试一次。`, true);
      }

      updateBestLevel() {
        if (this.level > this.bestLevel) {
          this.bestLevel = this.level;
          localStorage.setItem(GAME_CONFIG.localStorageKey, String(this.bestLevel));
        }
      }

      showMessage(text, sticky = false) {
        this.message = text;
        this.messageTimer = sticky ? Infinity : GAME_CONFIG.messageDuration;
      }

      enterBuildMode(typeKey) {
        const cfg = TOWER_TYPES[typeKey];
        if (!cfg) return;
        if (this.status === GAME_STATUS.FAILED) {
          this.showMessage("游戏失败后不能继续放置，请重新开始。");
          return;
        }
        if (this.gold < cfg.price) {
          this.showMessage(`金币不足，无法购买 ${cfg.name}。`);
          return;
        }
        this.buildModeTowerKey = typeKey;
        this.selectedTower = null;
        this.showMessage(`请选择一个空格放置 ${cfg.name}。再次点击“取消放置”可退出。`, true);
      }

      exitBuildMode() {
        this.buildModeTowerKey = null;
        if (this.status !== GAME_STATUS.FAILED) {
          this.showMessage("已退出放置模式。", false);
        }
      }

      clearSelectedTower() {
        this.selectedTower = null;
      }

      upgradeSelectedTower() {
        const tower = this.selectedTower;
        if (!tower) return;
        if (!tower.canUpgrade()) {
          this.showMessage(`${tower.config.name} 已经满级。`);
          return;
        }
        const cost = tower.getUpgradeCost();
        if (this.gold < cost) {
          this.showMessage(`金币不足，升级需要 ${cost} 金。`);
          return;
        }
        tower.upgrade();
        this.spawnFloatingText(`Lv.${tower.level}`, tower.x, tower.y - 32, tower.config.color, 1.2);
        this.showMessage(`${tower.config.name} 升级到 Lv.${tower.level}，花费 ${cost} 金。`);
      }

      sellSelectedTower() {
        if (!this.selectedTower) return;
        const tower = this.selectedTower;
        const sellPrice = tower.getSellPrice();
        this.gold += sellPrice;
        this.towers = this.towers.filter(t => t !== tower);
        this.selectedTower = null;
        this.showMessage(`已出售 ${tower.config.name}，获得 ${sellPrice} 金。`);
      }

      useMagnet() {
        if (this.status === GAME_STATUS.FAILED) return;
        if (this.treasure.state === "home") {
          this.showMessage("宝物还在初始位置，不需要使用吸铁石。");
          return;
        }
        if (this.treasure.state === "carried") {
          this.showMessage("吸铁石只能吸回被击杀怪物掉落的宝物，怪物搬运中不能使用。");
          return;
        }
        if (this.gold < GAME_CONFIG.magnetCost) {
          this.showMessage(`金币不足，吸铁石需要 ${GAME_CONFIG.magnetCost} 金。`);
          return;
        }
        this.gold -= GAME_CONFIG.magnetCost;
        const success = this.treasure.magnetBack();
        if (success) {
          this.showMessage(`吸铁石生效！掉落的宝物已回到右下角，消耗 ${GAME_CONFIG.magnetCost} 金。`);
        }
      }

      handleCanvasClick(x, y) {
        if (this.buildModeTowerKey) {
          this.tryPlaceTower(x, y);
          return;
        }

        const tower = this.getTowerAtPoint(x, y);
        if (tower) {
          this.selectedTower = tower;
          this.showMessage(`已选中 ${tower.config.name} Lv.${tower.level}。`);
        } else {
          this.selectedTower = null;
        }
      }

      tryPlaceTower(x, y) {
        const typeKey = this.buildModeTowerKey;
        const cfg = TOWER_TYPES[typeKey];
        const cell = this.pointToCell(x, y);

        if (!this.canPlaceTower(cell.col, cell.row)) {
          this.showMessage("这个格子不能放塔：已被占用，或位于巢穴/宝物初始点。", true);
          return;
        }

        if (this.gold < cfg.price) {
          this.showMessage(`金币不足，无法放置 ${cfg.name}。`, true);
          return;
        }

        const tower = new Tower(this, typeKey, cell.col, cell.row);
        this.towers.push(tower);
        this.gold -= cfg.price;
        this.selectedTower = tower;
        this.buildModeTowerKey = null;
        this.showMessage(`已放置 ${cfg.name}，花费 ${cfg.price} 金。`);
      }

      canPlaceTower(col, row) {
        if (col === 0 && row === 0) return false;
        if (col === GAME_CONFIG.gridCols - 1 && row === GAME_CONFIG.gridRows - 1) return false;
        return !this.towers.some(tower => tower.col === col && tower.row === row);
      }

      getTowerAtPoint(x, y) {
        const pickRadius = GAME_CONFIG.cellSize * 0.42;
        for (let i = this.towers.length - 1; i >= 0; i--) {
          const tower = this.towers[i];
          if (distanceXY(x, y, tower.x, tower.y) <= pickRadius) return tower;
        }
        return null;
      }

      getTargetForMonster(monster) {
        if (monster.carryingTreasure) {
          return { ...this.nestPosition, kind: "nest" };
        }

        const trap = this.getNearestTrap(monster.x, monster.y);
        if (trap) {
          return { x: trap.x, y: trap.y, kind: "trap", tower: trap };
        }

        return { x: this.treasure.x, y: this.treasure.y, kind: "treasure" };
      }

      getNearestTrap(x, y) {
        let best = null;
        let bestDistance = Infinity;
        for (const tower of this.towers) {
          if (!tower.isTrap) continue;
          const d = distanceXY(x, y, tower.x, tower.y);
          if (d <= tower.getLureRange() && d < bestDistance) {
            best = tower;
            bestDistance = d;
          }
        }
        return best;
      }

      triggerTrap(tower, monster) {
        if (!tower || !monster.alive) return;
        this.towers = this.towers.filter(t => t !== tower);
        if (this.selectedTower === tower) this.selectedTower = null;

        if (monster.config.isBoss) {
          const damage = monster.config.trapDamageTaken + tower.getTrapExplosionDamage();
          monster.takeDamage(damage);
          this.spawnFloatingText("Boss 受创!", tower.x, tower.y - 12, "#ff75d8", 1.4);
          this.showMessage(`${tower.config.name} 触发：Boss 摧毁诱捕塔并受到 ${Math.round(damage)} 点伤害。`);
        } else {
          monster.die();
          this.spawnFloatingText("诱捕!", tower.x, tower.y - 12, "#ff75d8", 1.2);
          this.showMessage(`${tower.config.name} 触发：消灭一只 ${monster.config.name}，诱捕塔消失。`);
        }

        this.applyTrapExplosion(tower, monster);
      }

      applyTrapExplosion(tower, primaryMonster) {
        const radius = tower.getTrapExplosionRadius();
        const damage = tower.getTrapExplosionDamage();
        if (radius <= 0 || damage <= 0) return;
        for (const monster of this.monsters) {
          if (!monster.alive || monster === primaryMonster) continue;
          const d = distanceXY(monster.x, monster.y, tower.x, tower.y);
          if (d <= radius + monster.radius * 0.25) {
            monster.takeDamage(damage);
          }
        }
        this.spawnFloatingText("爆炸", tower.x, tower.y + 18, "#ffd166", 1.1);
      }

      spawnFloatingText(text, x, y, color, maxLife = 1) {
        this.floatingTexts.push({ text, x, y, color, life: maxLife, maxLife });
      }

      update(dt) {
        if (this.status === GAME_STATUS.RUNNING) {
          this.gameTime += dt;
          const oldLevel = this.level;
          this.level = Math.floor(this.gameTime / GAME_CONFIG.levelDuration) + 1;
          if (this.level > oldLevel) {
            this.handleLevelUp(oldLevel, this.level);
          }

          this.updateSpawning(dt);

          // 每帧先重置减速，再由塔攻击重新赋予本帧减速。
          for (const monster of this.monsters) monster.beginFrame();
          for (const tower of this.towers) tower.update(dt);
          this.removeDeadMonsters();

          for (const monster of this.monsters) monster.update(dt);
          this.treasure.update(dt);
          this.removeDeadMonsters();
        }

        this.updateFloatingTexts(dt);
        this.updateMessageTimer(dt);
        this.ui.update();
      }

      handleLevelUp(oldLevel, newLevel) {
        this.showMessage(`等级提升到 ${newLevel}！怪物刷新更快，生命更高。`);
        for (let level = oldLevel + 1; level <= newLevel; level++) {
          if (level > 1 && level % GAME_CONFIG.bossEveryLevels === 0) {
            this.spawnBoss(level);
          }
        }
      }

      spawnBoss(level) {
        if (this.spawnedBossLevels.has(level)) return;
        this.spawnedBossLevels.add(level);
        this.spawnMonster("boss");
        this.spawnFloatingText("Boss 来袭!", this.nestPosition.x + 48, this.nestPosition.y + 8, "#ff4d6d", 1.8);
        this.showMessage(`Boss 来袭！第 ${level} 级出现强敌，击杀可获得大量金币。`);
      }

      updateSpawning(dt) {
        for (const [key, cfg] of Object.entries(MONSTER_TYPES)) {
          if (cfg.isBoss) continue;
          if (this.level < cfg.unlockLevel) {
            this.spawnTimers[key] = 0;
            continue;
          }

          if (this.monsters.length >= GAME_CONFIG.maxMonsters) return;

          this.spawnTimers[key] += dt;
          const interval = this.getAdjustedSpawnInterval(cfg.spawnInterval);
          if (this.spawnTimers[key] >= interval) {
            this.spawnTimers[key] = 0;
            this.spawnMonster(key);
          }
        }
      }

      getAdjustedSpawnInterval(baseInterval) {
        const factor = Math.max(
          GAME_CONFIG.minSpawnIntervalFactor,
          1 - (this.level - 1) * GAME_CONFIG.spawnIntervalReductionPerLevel
        );
        return baseInterval * factor;
      }

      spawnMonster(typeKey) {
        this.monsters.push(new Monster(this, typeKey));
      }

      removeDeadMonsters() {
        this.monsters = this.monsters.filter(monster => monster.alive);
      }

      updateFloatingTexts(dt) {
        for (const item of this.floatingTexts) {
          item.life -= dt;
          item.y -= dt * 32;
        }
        this.floatingTexts = this.floatingTexts.filter(item => item.life > 0);
      }

      updateMessageTimer(dt) {
        if (this.messageTimer === Infinity) return;
        if (this.messageTimer > 0) {
          this.messageTimer -= dt;
          if (this.messageTimer <= 0) {
            if (this.buildModeTowerKey) {
              this.message = `正在放置 ${TOWER_TYPES[this.buildModeTowerKey].name}。`;
              this.messageTimer = Infinity;
            } else if (this.status === GAME_STATUS.RUNNING) {
              const nextBoss = GAME_CONFIG.bossEveryLevels - (this.level % GAME_CONFIG.bossEveryLevels);
              this.message = nextBoss === GAME_CONFIG.bossEveryLevels
                ? "Boss 已在本级出现，守住宝物！"
                : `守住宝物，距离下一次 Boss 还有 ${nextBoss} 级。`;
            } else if (this.status === GAME_STATUS.PAUSED) {
              this.message = "游戏已暂停。";
            } else if (this.status === GAME_STATUS.NOT_STARTED) {
              this.message = "选择“开始游戏”，然后购买并放置防御塔。";
            }
          }
        }
      }

      loop(timestamp) {
        const dt = this.lastTimestamp ? Math.min(0.05, (timestamp - this.lastTimestamp) / 1000) : 0;
        this.lastTimestamp = timestamp;
        this.resizeCanvas();
        this.update(dt);
        this.draw();
        requestAnimationFrame((t) => this.loop(t));
      }

      draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.worldWidth, this.worldHeight);
        this.drawBackground(ctx);
        this.drawGridIfNeeded(ctx);
        this.drawOriginMarkers(ctx);

        // 先画塔，再画激光，最后画怪物和宝物，避免重要目标被覆盖。
        for (const tower of this.towers) {
          tower.draw(ctx, tower === this.selectedTower);
        }
        for (const tower of this.towers) {
          tower.drawLaser(ctx);
        }
        this.treasure.draw(ctx);
        for (const monster of this.monsters) monster.draw(ctx);
        this.drawFloatingTexts(ctx);
        this.drawPlacementPreview(ctx);
        this.drawStatusOverlay(ctx);
      }

      drawBackground(ctx) {
        const gradient = ctx.createLinearGradient(0, 0, this.worldWidth, this.worldHeight);
        gradient.addColorStop(0, "#15233b");
        gradient.addColorStop(0.6, "#0e1728");
        gradient.addColorStop(1, "#101a2e");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, this.worldWidth, this.worldHeight);

        // 装饰性微弱网点，常态下不显示棋盘线，但画面不会太空。
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#ffffff";
        for (let row = 0; row < GAME_CONFIG.gridRows; row++) {
          for (let col = 0; col < GAME_CONFIG.gridCols; col++) {
            const p = this.cellCenter(col, row);
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();

        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 3;
        ctx.strokeRect(1.5, 1.5, this.worldWidth - 3, this.worldHeight - 3);
      }

      drawGridIfNeeded(ctx) {
        if (!this.buildModeTowerKey) return;
        ctx.save();
        ctx.lineWidth = 1;
        for (let col = 0; col < GAME_CONFIG.gridCols; col++) {
          for (let row = 0; row < GAME_CONFIG.gridRows; row++) {
            const x = col * GAME_CONFIG.cellSize;
            const y = row * GAME_CONFIG.cellSize;
            const placeable = this.canPlaceTower(col, row);
            ctx.fillStyle = placeable ? "rgba(83, 211, 127, 0.08)" : "rgba(255, 92, 122, 0.10)";
            ctx.fillRect(x, y, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
            ctx.strokeStyle = placeable ? "rgba(255,255,255,0.22)" : "rgba(255,92,122,0.35)";
            ctx.strokeRect(x, y, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
          }
        }
        ctx.restore();
      }

      drawPlacementPreview(ctx) {
        if (!this.buildModeTowerKey || !this.pointer.active) return;
        const cfg = TOWER_TYPES[this.buildModeTowerKey];
        const cell = this.pointToCell(this.pointer.x, this.pointer.y);
        const center = this.cellCenter(cell.col, cell.row);
        const canPlace = this.canPlaceTower(cell.col, cell.row) && this.gold >= cfg.price;

        ctx.save();
        ctx.globalAlpha = canPlace ? 0.86 : 0.45;
        ctx.fillStyle = canPlace ? "rgba(83,211,127,0.16)" : "rgba(255,92,122,0.18)";
        ctx.fillRect(cell.col * GAME_CONFIG.cellSize, cell.row * GAME_CONFIG.cellSize, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
        ctx.strokeStyle = canPlace ? "#53d37f" : "#ff5c7a";
        ctx.lineWidth = 3;
        ctx.strokeRect(cell.col * GAME_CONFIG.cellSize + 1.5, cell.row * GAME_CONFIG.cellSize + 1.5, GAME_CONFIG.cellSize - 3, GAME_CONFIG.cellSize - 3);

        if (!cfg.isTrap && cfg.range > 0) {
          ctx.globalAlpha = 0.16;
          ctx.fillStyle = cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, cfg.range, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, cfg.range, 0, Math.PI * 2);
          ctx.stroke();
        } else if (cfg.isTrap) {
          ctx.globalAlpha = 0.16;
          ctx.fillStyle = cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, cfg.lureRange || 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, cfg.lureRange || 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      drawOriginMarkers(ctx) {
        const nest = this.nestPosition;
        const treasureOrigin = this.treasure.origin;
        const cell = GAME_CONFIG.cellSize;

        ctx.save();
        ctx.fillStyle = "rgba(255,92,122,0.16)";
        ctx.fillRect(0, 0, cell, cell);
        ctx.strokeStyle = "rgba(255,92,122,0.78)";
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, cell - 4, cell - 4);
        ctx.fillStyle = "#ff5c7a";
        ctx.beginPath();
        ctx.arc(nest.x, nest.y, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "900 20px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("巢", nest.x, nest.y + 1);

        ctx.fillStyle = "rgba(255,209,102,0.14)";
        ctx.fillRect((GAME_CONFIG.gridCols - 1) * cell, (GAME_CONFIG.gridRows - 1) * cell, cell, cell);
        ctx.strokeStyle = "rgba(255,209,102,0.78)";
        ctx.strokeRect((GAME_CONFIG.gridCols - 1) * cell + 2, (GAME_CONFIG.gridRows - 1) * cell + 2, cell - 4, cell - 4);

        // 这里只标记“宝物初始点”，不再绘制第二个宝物图标，保证宝物唯一。
        if (!this.treasure.isAtOrigin()) {
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = "800 13px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("初始点", treasureOrigin.x, treasureOrigin.y);
        }
        ctx.restore();
      }

      drawFloatingTexts(ctx) {
        ctx.save();
        ctx.font = "900 18px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (const item of this.floatingTexts) {
          ctx.globalAlpha = clamp(item.life / item.maxLife, 0, 1);
          ctx.fillStyle = item.color;
          ctx.shadowColor = "rgba(0,0,0,0.55)";
          ctx.shadowBlur = 5;
          ctx.fillText(item.text, item.x, item.y);
        }
        ctx.restore();
      }

      drawStatusOverlay(ctx) {
        if (this.status === GAME_STATUS.RUNNING) return;

        const textMap = {
          [GAME_STATUS.NOT_STARTED]: "点击开始游戏",
          [GAME_STATUS.PAUSED]: "游戏暂停",
          [GAME_STATUS.FAILED]: "游戏失败"
        };

        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.36)";
        ctx.fillRect(0, 0, this.worldWidth, this.worldHeight);

        ctx.fillStyle = "rgba(15, 24, 40, 0.88)";
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 2;
        const boxW = Math.min(420, this.worldWidth - 70);
        const boxH = 142;
        const boxX = (this.worldWidth - boxW) / 2;
        const boxY = (this.worldHeight - boxH) / 2;
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 18);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = this.status === GAME_STATUS.FAILED ? "#ff5c7a" : "#ffd166";
        ctx.font = "900 34px system-ui, sans-serif";
        ctx.fillText(textMap[this.status], this.worldWidth / 2, boxY + 50);

        ctx.fillStyle = "#dce7f7";
        ctx.font = "700 16px system-ui, sans-serif";
        const sub = this.status === GAME_STATUS.FAILED
          ? `最终等级 ${this.level} · 历史最高 ${this.bestLevel}`
          : "购买防御塔，阻止怪物搬回宝物";
        ctx.fillText(sub, this.worldWidth / 2, boxY + 88);
        ctx.fillStyle = "rgba(220,231,247,0.72)";
        ctx.font = "600 13px system-ui, sans-serif";
        ctx.fillText("电脑鼠标 / 手机触摸均可操作", this.worldWidth / 2, boxY + 114);
        ctx.restore();
      }
    }
    // =========================
    // 8. 独立绘制函数
    // =========================
    function drawTreasureShape(ctx, x, y, radius, dropped = false, ghost = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowColor = "rgba(255, 209, 102, 0.55)";
      ctx.shadowBlur = ghost ? 4 : 12;
      ctx.fillStyle = dropped ? "#ffb703" : "#ffd166";
      ctx.strokeStyle = ghost ? "rgba(255,255,255,0.45)" : "#fff6cc";
      ctx.lineWidth = ghost ? 1.5 : 2.5;
      ctx.beginPath();
      ctx.moveTo(0, -radius);
      ctx.lineTo(radius * 0.82, -radius * 0.15);
      ctx.lineTo(radius * 0.52, radius * 0.92);
      ctx.lineTo(-radius * 0.52, radius * 0.92);
      ctx.lineTo(-radius * 0.82, -radius * 0.15);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      if (dropped && !ghost) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "900 12px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("!", 0, 1);
      }
      ctx.restore();
    }

    // Canvas roundRect 兼容性兜底：现代浏览器已支持，这里防止极老环境报错。
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        this.moveTo(x + radius, y);
        this.lineTo(x + w - radius, y);
        this.quadraticCurveTo(x + w, y, x + w, y + radius);
        this.lineTo(x + w, y + h - radius);
        this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        this.lineTo(x + radius, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - radius);
        this.lineTo(x, y + radius);
        this.quadraticCurveTo(x, y, x + radius, y);
        return this;
      };
    }

    window.addEventListener("DOMContentLoaded", () => {
      new Game();
    });
  </script>
</body>
