<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>宝物守卫塔防</title>
  <style>
    :root {
      --bg: #101827;
      --panel: #17233a;
      --panel-2: #21314f;
      --text: #f5f7fb;
      --muted: #b9c4d6;
      --accent: #ffd166;
      --danger: #ff5c7a;
      --good: #53d37f;
      --blue: #65d1ff;
      --line: rgba(255,255,255,0.12);
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #22385e 0%, var(--bg) 55%, #070b12 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      touch-action: manipulation;
    }

    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 8px;
      overflow: hidden;
    }

    .app {
      width: min(1280px, 100%);
      height: calc(100dvh - 16px);
      display: grid;
      grid-template-columns: minmax(360px, 1fr) clamp(316px, 28vw, 356px);
      gap: 10px;
      align-items: stretch;
    }

    .game-card,
    .side-panel {
      background: rgba(23, 35, 58, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .game-card {
      padding: 8px;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .canvas-wrap {
      position: relative;
      width: min(100%, calc(100dvh - 36px));
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 13px;
      overflow: hidden;
      background: #0c1320;
      border: 1px solid rgba(255,255,255,0.16);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: crosshair;
    }

    .overlay-hint {
      position: absolute;
      left: 10px;
      bottom: 8px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    .side-panel {
      padding: 10px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 3px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.32;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
      margin-bottom: 6px;
    }

    .stat {
      min-width: 0;
      padding: 6px 5px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    .stat .label {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .stat .value {
      font-size: 17px;
      line-height: 1.05;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #statusText { font-size: 14px; }

    .message {
      min-height: 30px;
      margin: 0 0 7px;
      padding: 7px 8px;
      border-radius: 10px;
      background: rgba(255, 209, 102, 0.12);
      border: 1px solid rgba(255, 209, 102, 0.28);
      color: #ffe6a7;
      font-size: 12px;
      line-height: 1.25;
    }

    .section-title {
      margin: 7px 0 5px;
      color: #ffffff;
      font-weight: 900;
      font-size: 13px;
      line-height: 1.1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #buildModeText {
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
    }

    button {
      min-height: 34px;
      padding: 6px 7px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-size: 12px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0.01em;
      background: linear-gradient(180deg, #3b82f6, #245bc2);
      box-shadow: 0 4px 0 rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform .08s ease, filter .16s ease, opacity .16s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }

    button:hover { filter: brightness(1.08); }

    button:disabled {
      opacity: .43;
      cursor: not-allowed;
      filter: grayscale(.2);
      transform: none;
    }

    .btn-good { background: linear-gradient(180deg, #37c975, #15924c); }
    .btn-warn { background: linear-gradient(180deg, #ffbd45, #c67a06); }
    .btn-danger { background: linear-gradient(180deg, #ff6381, #ba2544); }
    .btn-muted { background: linear-gradient(180deg, #536178, #303a4d); }
    .btn-magnet { background: linear-gradient(180deg, #a671ff, #6530c5); }
    .btn-evolve { background: linear-gradient(180deg, #16c1df, #087ea4); }

    .tower-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }

    .tower-button {
      min-height: 50px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 4px;
      align-items: center;
      text-align: left;
      padding: 6px;
      background: linear-gradient(180deg, #2b426b, #1c2b48);
    }

    .tower-button.active {
      outline: 2px solid var(--accent);
      box-shadow: 0 0 0 3px rgba(255,209,102,0.16), 0 4px 0 rgba(0,0,0,0.25);
    }

    .tower-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.14);
      font-size: 14px;
      font-weight: 900;
    }

    .tower-main { min-width: 0; }

    .tower-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 4px;
      min-width: 0;
    }

    .tower-name {
      font-size: 12px;
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tower-desc {
      display: block;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.15;
      margin-top: 3px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tower-price {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
    }

    .info-card {
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-height: 62px;
      max-height: 94px;
      overflow: hidden;
    }

    .info-card strong { color: #fff; }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 3px 7px;
      margin-top: 0;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.1;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
      background: #fff;
    }

    @media (min-width: 901px) and (max-height: 720px) {
      body { padding: 6px; }
      .app { height: calc(100dvh - 12px); gap: 8px; }
      .game-card, .side-panel { border-radius: 14px; }
      .side-panel { padding: 8px; }
      h1 { font-size: 18px; }
      .subtitle { display: none; }
      .stat { padding: 5px 4px; }
      .stat .value { font-size: 15px; }
      .message { min-height: 26px; padding: 5px 7px; font-size: 11px; }
      .section-title { margin: 5px 0 4px; font-size: 12px; }
      button { min-height: 30px; padding: 4px 5px; font-size: 11px; border-radius: 8px; }
      .tower-button { min-height: 43px; padding: 5px; }
      .tower-icon { width: 24px; height: 24px; font-size: 12px; }
      .tower-name { font-size: 11px; }
      .tower-desc, .tower-price { font-size: 9.5px; }
      .info-card { min-height: 58px; padding: 6px 7px; font-size: 11px; line-height: 1.25; }
      .legend { grid-template-columns: repeat(4, minmax(0, 1fr)); font-size: 9.5px; }
      .legend-section-title { display: none; }
    }

    @media (max-width: 900px) {
      html, body { height: auto; min-height: 100%; }
      body {
        min-height: 100dvh;
        padding: 6px;
        overflow: auto;
        align-items: flex-start;
      }

      .app {
        height: auto;
        width: 100%;
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .game-card { padding: 6px; }
      .canvas-wrap { width: 100%; max-height: none; }
      .side-panel { padding: 8px; overflow: visible; }
      h1 { font-size: 19px; }
      .subtitle { margin-bottom: 6px; font-size: 11.5px; }
      .stats { gap: 4px; margin-bottom: 5px; }
      .stat { padding: 5px 4px; border-radius: 9px; }
      .stat .label { font-size: 9.5px; }
      .stat .value { font-size: 15px; }
      #statusText { font-size: 12px; }
      .message { min-height: 26px; padding: 6px 7px; margin-bottom: 5px; font-size: 11.5px; }
      .section-title { margin: 6px 0 4px; font-size: 12.5px; }
      .button-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
      button { min-height: 36px; padding: 5px 5px; font-size: 11.5px; border-radius: 9px; }
      .tower-list { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 4px; }
      .tower-button { min-height: 48px; grid-template-columns: 24px minmax(0, 1fr); padding: 5px; gap: 5px; }
      .tower-icon { width: 24px; height: 24px; font-size: 12px; }
      .tower-name { font-size: 11px; }
      .tower-desc { font-size: 9.5px; }
      .tower-price { font-size: 10px; }
      .info-card { min-height: 58px; padding: 6px 7px; font-size: 11.5px; line-height: 1.28; }
      .legend { grid-template-columns: repeat(4, minmax(0, 1fr)); font-size: 9.5px; gap: 3px 5px; }
    }

    @media (max-width: 520px) {
      body { padding: 4px; }
      .app { gap: 5px; }
      .game-card, .side-panel { border-radius: 12px; }
      .game-card { padding: 4px; }
      .side-panel { padding: 6px; }
      .overlay-hint { display: none; }
      h1 { font-size: 18px; margin-bottom: 2px; }
      .subtitle { display: none; }
      .stats { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 3px; }
      .stat { padding: 4px 3px; }
      .stat .label { font-size: 8.8px; }
      .stat .value { font-size: 13.5px; }
      .message { min-height: 24px; font-size: 10.8px; line-height: 1.2; padding: 5px 6px; }
      .button-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 3px; }
      button { min-height: 34px; padding: 4px 4px; font-size: 10.8px; border-radius: 8px; }
      .section-title { font-size: 11.5px; margin: 5px 0 3px; }
      .tower-list { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 3px; }
      .tower-button { min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3px 2px; gap: 2px; }
      .tower-icon { width: 21px; height: 21px; font-size: 11px; }
      .tower-main { width: 100%; }
      .tower-top { display: block; }
      .tower-name { font-size: 10px; line-height: 1.05; }
      .tower-desc { display: none; }
      .tower-price { display: block; margin-top: 2px; font-size: 9px; }
      .info-card { min-height: 48px; font-size: 10.8px; line-height: 1.22; }
      .legend-section-title, .legend { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game-card">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="gameCanvas" aria-label="塔防游戏画面"></canvas>
        <div class="overlay-hint">
          <span>点击空格放塔 / 点击已有塔查看信息</span>
          <span>怪物搬回宝物即失败</span>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <h1>宝物守卫塔防</h1>
      <p class="subtitle">守住右下角宝物。满级塔可进化；地形会改变建造、升级和战斗表现。</p>

      <div class="stats">
        <div class="stat"><div class="label">等级</div><div class="value" id="levelText">1</div></div>
        <div class="stat"><div class="label">金币</div><div class="value" id="goldText">0</div></div>
        <div class="stat"><div class="label">最高</div><div class="value" id="bestLevelText">1</div></div>
        <div class="stat"><div class="label">时间</div><div class="value" id="timeText">00:00</div></div>
        <div class="stat"><div class="label">状态</div><div class="value" id="statusText">未开始</div></div>
      </div>

      <div class="message" id="messageText">选择“开始游戏”，然后购买并放置防御塔。</div>

      <div class="section-title">游戏控制 / 选中塔操作</div>
      <div class="button-grid control-grid">
        <button id="startBtn" class="btn-good">开始</button>
        <button id="pauseBtn" class="btn-warn">暂停</button>
        <button id="resumeBtn" class="btn-good">继续</button>
        <button id="restartBtn" class="btn-danger">重开</button>
        <button id="magnetBtn" class="btn-magnet">吸铁石</button>
        <button id="cancelBuildBtn" class="btn-muted">取消</button>
        <button id="upgradeBtn" class="btn-good">升级</button>
        <button id="evolveBtnA" class="btn-evolve">进化 A</button>
        <button id="evolveBtnB" class="btn-evolve">进化 B</button>
        <button id="sellBtn" class="btn-danger">出售</button>
        <button id="clearSelectBtn" class="btn-muted">清选</button>
      </div>

      <div class="section-title">
        <span>购买防御塔</span>
        <span id="buildModeText"></span>
      </div>
      <div class="tower-list" id="towerList"></div>

      <div class="section-title">选中防御塔</div>
      <div class="info-card" id="towerInfo">暂无选中防御塔。</div>

      <div class="section-title legend-section-title">图例</div>
      <div class="legend">
        <span><i class="dot" style="background:#ff5c7a"></i>巢穴</span>
        <span><i class="dot" style="background:#ffd166"></i>宝物</span>
        <span><i class="dot" style="background:#65d1ff"></i>普通怪</span>
        <span><i class="dot" style="background:#b084ff"></i>精英怪</span>
        <span><i class="dot" style="background:#53d37f"></i>急行怪</span>
        <span><i class="dot" style="background:#ff9f43"></i>肉盾怪</span>
        <span><i class="dot" style="background:#f6e05e"></i>侦查怪</span>
        <span><i class="dot" style="background:#9b5de5"></i>生产Boss</span>
        <span><i class="dot" style="background:#ffcf66"></i>旗帜</span>
        <span><i class="dot" style="background:#4dd4ac"></i>增益</span>
        <span><i class="dot" style="background:#ff6b6b"></i>减益</span>
      </div>
    </aside>
  </main>

  <script>
    // =========================
    // 1. 全局配置：后续扩展优先改这里
    // =========================
    const GAME_CONFIG = {
      gridRows: 10,
      gridCols: 10,
      cellSize: 80,

      // 初始金币为 null 时，会自动使用“两个普通塔”的价格。
      initialGold: null,
      levelDuration: 45,
      magnetCost: 45,
      // 宝物掉落后的保护时间：期间怪物会靠近宝物，但不能立刻再次拾取。
      treasureDropProtectionDuration: 2.2,
      treasureDropProtectionRadius: 56,
      // Boss 不参与普通刷新表，而是在升级时单独生成；后期刷新间隔会逐步缩短。
      firstBossLevel: 5,
      bossEveryLevels: 5,
      bossIntervalStages: [
        { minLevel: 1, interval: 5 },
        { minLevel: 10, interval: 4 },
        { minLevel: 18, interval: 3 },
        { minLevel: 30, interval: 2 }
      ],
      bossExtraCountEveryLevels: 20,
      maxBossesPerSpawn: 3,
      localStorageKey: "treasure_td_best_level_v1",

      monsterRadius: 15,
      treasureRadius: 16,
      treasurePickupRadius: 24,
      nestReturnRadius: 28,
      trapTriggerRadius: 30,

      maxMonsters: 260,
      spawnIntervalReductionPerLevel: 0.085,
      minSpawnIntervalFactor: 0.24,
      spawnBatchIncreaseEveryLevels: 10,
      maxSpawnBatchSize: 4,
      monsterHpGrowthPerLevel: 0.075,
      bossHpGrowthPerLevel: 0.095,
      monsterSpeedGrowthPerLevel: 0.012,
      bossSpeedGrowthPerLevel: 0.006,
      maxMonsterSpeedBonus: 0.42,
      maxBossSpeedBonus: 0.22,
      monsterRewardGrowthPerLevel: 0.018,
      bossRewardGrowthPerLevel: 0.035,
      bossSizeGrowthPerLevel: 0.025,
      bossMaxSizeMultiplier: 2.95,

      // 侦查怪按“等级事件”出现：初期每 6 级一次，后期逐步缩短间隔。
      scoutFirstLevel: 6,
      scoutIntervalStages: [
        { minLevel: 6, interval: 6 },
        { minLevel: 14, interval: 5 },
        { minLevel: 24, interval: 4 },
        { minLevel: 36, interval: 3 },
        { minLevel: 54, interval: 2 }
      ],
      scoutExtraCountEveryLevels: 20,
      maxScoutsPerEvent: 3,

      // 侦查怪死亡后留下旗帜，普通怪会轻微受旗帜吸引；生产型 Boss 受影响更强。
      flagAttractionWeight: 0.15,
      bossFlagAttractionWeight: 0.18,
      producerBossFlagAttractionWeight: 0.62,
      flagAttractionRadius: 1000,
      flagMaxCount: 18,

      // 生产型 Boss：移动一段时间后停下读条，成功后生成逐步成长的新巢穴。
      producerBossMoveDuration: 12,
      producerBossChannelDuration: 8,
      producerBossIntroBossIndex: 2,
      producerBossRepeatEveryBossEvents: 4,
      generatedNestRampDuration: 150,
      generatedNestLevelDuration: 45,
      generatedNestMinSpawnPower: 0.12,
      generatedNestMaxCount: 8,

      targetVectorWeight: 0.94,
      towerAvoidWeight: 0.68,
      towerAvoidRadius: 170,

      messageDuration: 2.6,
      laserWidth: 3,
      worldPadding: 0
    };

    const MONSTER_TYPES = {
      normal: {
        name: "普通怪",
        hp: 100,
        speed: 52,
        reward: 10,
        spawnInterval: 5,
        unlockLevel: 1,
        icon: "circle",
        color: "#65d1ff"
      },
      elite: {
        name: "精英怪",
        // 精英怪血量保持为普通怪的 1.5 倍，降低早期难度。
        hp: 150,
        speed: 44,
        reward: 30,
        // 刷新间隔比原先更长，避免精英怪过早堆积。
        spawnInterval: 30,
        unlockLevel: 1,
        icon: "diamond",
        color: "#b084ff"
      },
      runner: {
        name: "急行怪",
        hp: 72,
        speed: 94,
        reward: 15,
        spawnInterval: 8,
        unlockLevel: 4,
        icon: "triangle",
        color: "#53d37f"
      },
      tank: {
        name: "肉盾怪",
        hp: 640,
        speed: 32,
        reward: 55,
        spawnInterval: 18,
        unlockLevel: 4,
        icon: "square",
        color: "#ff9f43"
      },
      scout: {
        name: "侦查怪",
        hp: 92,
        speed: 82,
        reward: 28,
        // 侦查怪由等级事件触发，不参与普通按秒刷新。
        spawnInterval: Infinity,
        unlockLevel: Infinity,
        icon: "scout",
        color: "#f6e05e",
        isScout: true,
        pathRecalcInterval: 0.42
      },
      boss: {
        name: "Boss 怪",
        hp: 2400,
        speed: 30,
        reward: 220,
        // Boss 由等级事件触发，不参与普通按秒刷新。
        spawnInterval: Infinity,
        unlockLevel: Infinity,
        icon: "boss",
        color: "#ff4d6d",
        isBoss: true,
        sizeMultiplier: 1.75,
        carrySpeedMultiplier: 0.55,
        trapDamageTaken: 460
      },
      producerBoss: {
        name: "生产型 Boss",
        hp: 3200,
        speed: 28,
        reward: 280,
        // 生产型 Boss 由 Boss 等级事件触发，不参与普通按秒刷新。

    // =========================
    // 2. 工具函数
    // =========================
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function distanceXY(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }

    function normalize(x, y) {
      const len = Math.hypot(x, y);
      if (len <= 0.00001) return { x: 0, y: 0 };
      return { x: x / len, y: y / len };
    }

    function formatTime(seconds) {
      const s = Math.floor(seconds);
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function round1(value) {
      return Math.round(value * 10) / 10;
    }

    function cellKey(col, row) {
      return `${col},${row}`;
    }

    function distancePointToSegment(px, py, ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (lenSq <= 0.00001) return distanceXY(px, py, ax, ay);
      const t = clamp(((px - ax) * dx + (py - ay) * dy) / lenSq, 0, 1);
      const sx = ax + dx * t;
      const sy = ay + dy * t;
      return distanceXY(px, py, sx, sy);
    }

    // =========================
    // 3. 宝物
    // =========================
    class Treasure {
      constructor(game) {
        this.game = game;
        this.reset();
      }

      get origin() {
        return this.game.cellCenter(GAME_CONFIG.gridCols - 1, GAME_CONFIG.gridRows - 1);
      }

      reset() {
        const origin = this.origin;
        this.x = origin.x;
        this.y = origin.y;
        this.carrier = null;
        this.state = "home"; // home | dropped | carried
        this.protectionTimer = 0;
      }

      attachTo(monster) {
        this.carrier = monster;
        this.state = "carried";
        this.protectionTimer = 0;
        this.update(0);
      }

      dropAt(x, y) {
        this.carrier = null;
        this.x = clamp(x, GAME_CONFIG.treasureRadius, this.game.worldWidth - GAME_CONFIG.treasureRadius);
        this.y = clamp(y, GAME_CONFIG.treasureRadius, this.game.worldHeight - GAME_CONFIG.treasureRadius);
        this.state = "dropped";
        this.protectionTimer = GAME_CONFIG.treasureDropProtectionDuration;
      }

      magnetBack() {
        // 吸铁石只允许吸回“掉落在地上”的宝物，不能从怪物手里直接抢回。
        if (this.state !== "dropped" || this.carrier) return false;
        this.reset();
        return true;
      }

      update(dt) {
        if (this.carrier) {
          this.x = this.carrier.x;
          this.y = this.carrier.y;
          return;
        }
        if (this.protectionTimer > 0) {
          this.protectionTimer = Math.max(0, this.protectionTimer - dt);
        }
      }

      canBePickedUp() {
        return !this.carrier && this.protectionTimer <= 0;
      }

      isAtOrigin() {
        const origin = this.origin;
        return !this.carrier && distanceXY(this.x, this.y, origin.x, origin.y) < 1 && this.state === "home";
      }

      draw(ctx) {
        if (this.carrier) return;

        if (this.state === "dropped" && this.protectionTimer > 0) {
          const ratio = this.protectionTimer / GAME_CONFIG.treasureDropProtectionDuration;
          const radius = GAME_CONFIG.treasureDropProtectionRadius * (0.82 + 0.18 * Math.sin(performance.now() / 120));
          ctx.save();
          ctx.globalAlpha = 0.22 + ratio * 0.18;
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.65;
          ctx.strokeStyle = "#fff1a8";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = "#fff8dc";
          ctx.font = "900 13px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`${this.protectionTimer.toFixed(1)}s`, this.x, this.y + 34);
          ctx.restore();
        }

        drawTreasureShape(ctx, this.x, this.y, GAME_CONFIG.treasureRadius, this.state === "dropped");
      }
    }
    // =========================
    // 4. 怪物
    // =========================
    class Monster {
      constructor(game, typeKey, spawnNest = null, options = {}) {
        this.game = game;
        this.typeKey = typeKey;
        this.config = MONSTER_TYPES[typeKey];
        this.spawnNest = spawnNest || game.getMainNest();
        this.spawnLevel = options.spawnLevel ?? game.getMonsterSpawnLevel(this.spawnNest, typeKey);

        const levelIndex = Math.max(0, this.spawnLevel - 1);
        const hpGrowth = this.config.isBoss ? GAME_CONFIG.bossHpGrowthPerLevel : GAME_CONFIG.monsterHpGrowthPerLevel;
        const hpScale = Math.pow(1 + hpGrowth, levelIndex);
        const densityPressure = this.config.isBoss ? 1 : 1 + Math.floor(levelIndex / 12) * 0.08;
        this.maxHp = Math.round(this.config.hp * hpScale * densityPressure);
        this.hp = this.maxHp;

        const speedGrowth = this.config.isBoss ? GAME_CONFIG.bossSpeedGrowthPerLevel : GAME_CONFIG.monsterSpeedGrowthPerLevel;
        const maxSpeedBonus = this.config.isBoss ? GAME_CONFIG.maxBossSpeedBonus : GAME_CONFIG.maxMonsterSpeedBonus;
        this.speed = this.config.speed * (1 + Math.min(maxSpeedBonus, levelIndex * speedGrowth));

        const rewardGrowth = this.config.isBoss ? GAME_CONFIG.bossRewardGrowthPerLevel : GAME_CONFIG.monsterRewardGrowthPerLevel;
        this.reward = Math.round(this.config.reward * (1 + levelIndex * rewardGrowth));

        const sizeMultiplier = this.config.isBoss
          ? Math.min(GAME_CONFIG.bossMaxSizeMultiplier, (this.config.sizeMultiplier || 1) + levelIndex * GAME_CONFIG.bossSizeGrowthPerLevel)
          : (this.config.sizeMultiplier || 1);
        this.radius = GAME_CONFIG.monsterRadius * sizeMultiplier;

        const spawn = this.spawnNest || game.getMainNest();
        const jitter = GAME_CONFIG.cellSize * 0.12;
        this.x = spawn.x + (Math.random() - 0.5) * jitter;
        this.y = spawn.y + (Math.random() - 0.5) * jitter;
        this.carryingTreasure = false;
        this.slowMultiplier = 1;
        this.isSlowed = false;
        this.alive = true;
        this.age = 0;
        this.pathPoints = [];
        this.pathRecalcTimer = 0;
        this.pathKey = "";
        this.producerState = this.config.isProducerBoss ? "moving" : null;
        this.producerMoveTimer = 0;
        this.producerChannelTimer = 0;
        this.currentTarget = { x: this.x, y: this.y, kind: "none" };
      }

      beginFrame() {
        this.slowMultiplier = 1;
        this.isSlowed = false;
      }

      applySlow(multiplier) {
        if (multiplier < this.slowMultiplier) {
          this.slowMultiplier = multiplier;
          this.isSlowed = true;
        }
      }

      takeDamage(amount) {
        if (!this.alive) return;
        this.hp -= amount;
        if (this.hp <= 0) {
          this.die();
        }
      }

      die(options = {}) {
        if (!this.alive) return;
        this.alive = false;
        if (this.carryingTreasure) {
          this.carryingTreasure = false;
          this.game.treasure.dropAt(this.x, this.y);
          this.game.showMessage("搬运宝物的怪物被击杀，宝物掉落并获得短暂保护！");
        }
        if (this.config.isScout && !options.noFlag) {
          this.game.placeFlag(this.x, this.y);
        }
        if (this.config.isProducerBoss && this.producerState === "channeling" && !options.productionComplete) {
          this.game.spawnFloatingText("筑巢中断", this.x, this.y - this.radius - 18, "#ffcf66", 1.35);
          this.game.showMessage("生产型 Boss 在读条阶段被击杀，新巢穴没有生成！");
        }
        if (!options.noReward) {
          this.game.gold += this.reward;
          const goldText = this.config.isBoss ? `Boss +${this.reward}` : `+${this.reward}`;
          this.game.spawnFloatingText(goldText, this.x, this.y - this.radius - 8, "#ffd166", this.config.isBoss ? 1.45 : 1);
        }
      }

      update(dt) {
        if (!this.alive) return;
        this.age += dt;

        if (this.config.isProducerBoss && this.updateProducerBossState(dt)) {
          return;
        }

        const target = this.game.getTargetForMonster(this);
        this.currentTarget = target;

        const finalDir = this.config.isScout
          ? this.getScoutDirection(target, dt)
          : this.getSteeringDirection(target);

        const carryFactor = this.carryingTreasure ? (this.config.carrySpeedMultiplier || 1) : 1;
        const moveDistance = this.speed * this.slowMultiplier * carryFactor * dt;
        this.x += finalDir.x * moveDistance;
        this.y += finalDir.y * moveDistance;

        const r = this.radius;
        this.x = clamp(this.x, r, this.game.worldWidth - r);
        this.y = clamp(this.y, r, this.game.worldHeight - r);

        this.handleObjectiveCollision(target);
      }

      updateProducerBossState(dt) {
        if (this.producerState === "channeling") {
          this.producerChannelTimer += dt;
          this.currentTarget = { x: this.x, y: this.y, kind: "channeling" };
          if (this.producerChannelTimer >= GAME_CONFIG.producerBossChannelDuration) {
            this.game.completeProducerBoss(this);
          }
          return true;
        }

        this.producerMoveTimer += dt;
        if (this.producerMoveTimer >= GAME_CONFIG.producerBossMoveDuration) {
          this.producerState = "channeling";
          this.producerChannelTimer = 0;
          this.currentTarget = { x: this.x, y: this.y, kind: "channeling" };
          this.game.spawnFloatingText("开始筑巢", this.x, this.y - this.radius - 18, "#ffcf66", 1.35);
          this.game.showMessage("生产型 Boss 停下开始读条筑巢，8 秒内击杀可阻止新巢穴生成！");
          return true;
        }
        return false;
      }

      getSteeringDirection(target) {
        const toTarget = normalize(target.x - this.x, target.y - this.y);
        let avoidX = 0;
        let avoidY = 0;

        for (const tower of this.game.towers) {
          if (target.kind === "trap" && target.tower === tower) continue;
          const d = distanceXY(this.x, this.y, tower.x, tower.y);
          if (d > 0.001 && d < GAME_CONFIG.towerAvoidRadius) {
            const strength = (GAME_CONFIG.towerAvoidRadius - d) / GAME_CONFIG.towerAvoidRadius;
            avoidX += (this.x - tower.x) / d * strength;
            avoidY += (this.y - tower.y) / d * strength;
          }
        }

        const avoid = normalize(avoidX, avoidY);
        const flag = this.game.getFlagAttractionVector(this.x, this.y);
        const flagWeight = this.getFlagAttractionWeight();
        return normalize(
          toTarget.x * GAME_CONFIG.targetVectorWeight + avoid.x * GAME_CONFIG.towerAvoidWeight + flag.x * flagWeight,
          toTarget.y * GAME_CONFIG.targetVectorWeight + avoid.y * GAME_CONFIG.towerAvoidWeight + flag.y * flagWeight
        );
      }

      getFlagAttractionWeight() {
        if (this.config.isScout) return 0;
        let weight = this.config.isProducerBoss
          ? GAME_CONFIG.producerBossFlagAttractionWeight
          : this.config.isBoss
            ? GAME_CONFIG.bossFlagAttractionWeight
            : GAME_CONFIG.flagAttractionWeight;
        if (this.carryingTreasure) weight *= 0.35;
        return weight;
      }

      getScoutDirection(target, dt) {
        this.pathRecalcTimer -= dt;
        const start = this.game.pointToCell(this.x, this.y);
        const goal = this.game.pointToCell(target.x, target.y);
        const key = `${start.col},${start.row}->${goal.col},${goal.row}:${this.game.pathVersion}`;
        if (this.pathRecalcTimer <= 0 || this.pathKey !== key || this.pathPoints.length === 0) {
          this.pathPoints = this.game.findLowestDamagePath(this, target);
          this.pathKey = key;
          this.pathRecalcTimer = this.config.pathRecalcInterval || 0.45;
        }

        while (this.pathPoints.length > 0 && distanceXY(this.x, this.y, this.pathPoints[0].x, this.pathPoints[0].y) < 6) {
          this.pathPoints.shift();
        }

        const waypoint = this.pathPoints[0] || target;
        const dir = normalize(waypoint.x - this.x, waypoint.y - this.y);
        if (Math.abs(dir.x) + Math.abs(dir.y) <= 0.0001) {
          return normalize(target.x - this.x, target.y - this.y);
        }
        return dir;
      }

      handleObjectiveCollision(target) {
        if (!this.alive) return;

        if (this.carryingTreasure) {
          const nest = this.spawnNest || this.game.getMainNest();
          if (distanceXY(this.x, this.y, nest.x, nest.y) <= GAME_CONFIG.nestReturnRadius + this.radius * 0.35) {
            this.game.failGame("怪物成功把宝物搬回巢穴！");
          }
          return;
        }

        if (target.kind === "trap" && target.tower) {
          const d = distanceXY(this.x, this.y, target.tower.x, target.tower.y);
          if (d <= GAME_CONFIG.trapTriggerRadius + this.radius * 0.25) {
            this.game.triggerTrap(target.tower, this);
          }
          return;
        }

        const treasure = this.game.treasure;
        if (this.config.canCarryTreasure === false) return;
        if (treasure.canBePickedUp() && distanceXY(this.x, this.y, treasure.x, treasure.y) <= GAME_CONFIG.treasurePickupRadius + this.radius * 0.25) {
          this.carryingTreasure = true;
          treasure.attachTo(this);
          this.game.showMessage(`${this.config.name} 搬起了宝物，正在返回巢穴！`);
        }
      }

      draw(ctx) {
        if (!this.alive) return;
        const r = this.radius;
        ctx.save();
        ctx.translate(this.x, this.y);

        ctx.shadowColor = this.config.isBoss ? "rgba(255,77,109,0.55)" : "rgba(0,0,0,0.35)";
        ctx.shadowBlur = this.config.isBoss ? 14 : 6;
        ctx.fillStyle = this.config.color;
        ctx.strokeStyle = this.config.isBoss ? "#ffe6ee" : "rgba(255,255,255,0.85)";
        ctx.lineWidth = this.config.isBoss ? 3 : 2;

        if (this.config.icon === "producerBoss") {
          ctx.beginPath();
          for (let i = 0; i < 10; i++) {
            const angle = -Math.PI / 2 + i * Math.PI * 2 / 10;
            const rr = i % 2 === 0 ? r + 9 : r * 0.72;
            const px = Math.cos(angle) * rr;
            const py = Math.sin(angle) * rr;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.font = "900 18px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("产", 0, 1);
        } else if (this.config.icon === "boss") {
          ctx.beginPath();
          for (let i = 0; i < 12; i++) {
            const angle = -Math.PI / 2 + i * Math.PI / 6;
            const rr = i % 2 === 0 ? r + 8 : r * 0.78;
            const px = Math.cos(angle) * rr;
            const py = Math.sin(angle) * rr;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.font = "900 18px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("B", 0, 1);
        } else if (this.config.icon === "diamond") {
          ctx.beginPath();
          ctx.moveTo(0, -r - 2);
          ctx.lineTo(r + 2, 0);
          ctx.lineTo(0, r + 2);
          ctx.lineTo(-r - 2, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (this.config.icon === "triangle") {
          ctx.beginPath();
          ctx.moveTo(0, -r - 4);
          ctx.lineTo(r + 4, r + 2);
          ctx.lineTo(-r - 4, r + 2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (this.config.icon === "scout") {
          ctx.beginPath();
          ctx.arc(0, 0, r + 1, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(8,13,24,0.92)";
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.48, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-r - 4, 0);
          ctx.quadraticCurveTo(0, -r * 0.82, r + 4, 0);
          ctx.quadraticCurveTo(0, r * 0.82, -r - 4, 0);
          ctx.stroke();
        } else if (this.config.icon === "square") {
          ctx.beginPath();
          ctx.roundRect(-r - 2, -r - 2, (r + 2) * 2, (r + 2) * 2, 5);
          ctx.fill();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        if (this.isSlowed) {
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(134, 240, 198, 0.95)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, r + 7, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (this.config.isProducerBoss && this.producerState === "channeling") {
          const pct = clamp(this.producerChannelTimer / GAME_CONFIG.producerBossChannelDuration, 0, 1);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#ffcf66";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, r + 14, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.96)";
          ctx.font = "900 12px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("筑巢", 0, r + 23);
        }

        if (this.carryingTreasure) {
          drawTreasureShape(ctx, 0, -r - 18, 10, false);
        }

        ctx.restore();

        this.drawHpBar(ctx);
      }

      drawHpBar(ctx) {
        const w = this.config.isBoss ? Math.max(66, this.radius * 3.1) : 38;
        const h = this.config.isBoss ? Math.max(7, this.radius * 0.28) : 5;
        const pct = clamp(this.hp / this.maxHp, 0, 1);
        const x = this.x - w / 2;
        const y = this.y - this.radius - 18;
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = pct > 0.5 ? "#53d37f" : pct > 0.25 ? "#ffd166" : "#ff5c7a";
        ctx.fillRect(x, y, w * pct, h);
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.strokeRect(x, y, w, h);
        ctx.restore();
      }
    }
    // =========================
    // 5. 防御塔
    // =========================
    class Tower {
      constructor(game, typeKey, col, row, placementCost = null) {
        this.game = game;
        this.typeKey = typeKey;
        this.config = TOWER_TYPES[typeKey];
        this.col = col;
        this.row = row;
        const center = game.cellCenter(col, row);
        this.x = center.x;
        this.y = center.y;
        this.level = 1;
        this.upgradeSpent = 0;
        this.evolutionKey = null;
        this.evolutionSpent = 0;
        this.placementCost = placementCost ?? this.config.price;
        this.terrainKey = game.getTerrainKeyAtCell(col, row);
        this.lastTarget = null;
        this.lastAoe = null;
        this.lastPierce = null;
        this.lastExplosion = null;
        this.pulse = Math.random() * Math.PI * 2;
      }

      get isTrap() {
        return Boolean(this.config.isTrap);
      }

      get upgradeConfig() {
        return this.config.upgrade || { maxLevel: 1 };
      }

      get maxLevel() {
        return this.upgradeConfig.maxLevel || 1;
      }

      get levelIndex() {
        return this.level - 1;
      }

      getEvolutionConfig() {
        if (!this.evolutionKey) return null;
        return this.config.evolutions?.[this.evolutionKey] || null;
      }

      getEvolutionOptions() {
        return Object.entries(this.config.evolutions || {}).map(([key, cfg]) => ({ key, ...cfg }));
      }

      getDisplayName() {
        return this.getEvolutionConfig()?.name || this.config.name;
      }

      getDisplayIcon() {
        return this.getEvolutionConfig()?.icon || this.config.icon;
      }

      getDisplayColor() {
        return this.getEvolutionConfig()?.color || this.config.color;
      }

      getTerrainEffects() {
        return this.game.getTerrainTowerEffects(this.col, this.row);
      }

      getDamagePerSecond() {
        const evo = this.getEvolutionConfig();
        const terrain = this.getTerrainEffects();
        const levelMult = this.upgradeConfig.damageMultiplierPerLevel || 1;
        const evoMult = evo?.damageMultiplier || 1;
        const terrainMult = terrain.damageMultiplier || 1;
        return this.config.damagePerSecond * Math.pow(levelMult, this.levelIndex) * evoMult * terrainMult;
      }

      getDamageAgainst(monster) {
        const evo = this.getEvolutionConfig();
        let damage = this.getDamagePerSecond();
        if (monster?.config?.isBoss && evo?.bossDamageMultiplier) damage *= evo.bossDamageMultiplier;
        if (monster?.carryingTreasure && evo?.carrierDamageMultiplier) damage *= evo.carrierDamageMultiplier;
        return damage;
      }

      getRange() {
        const evo = this.getEvolutionConfig();
        const terrain = this.getTerrainEffects();
        const base = this.config.range + (this.upgradeConfig.rangeBonusPerLevel || 0) * this.levelIndex + (evo?.rangeBonus || 0);
        return Math.max(0, base * (evo?.rangeMultiplier || 1) * (terrain.rangeMultiplier || 1) + (terrain.rangeBonus || 0));
      }

      getAoeRadius() {
        const evo = this.getEvolutionConfig();
        const base = this.config.aoeRadius + (this.upgradeConfig.aoeRadiusBonusPerLevel || 0) * this.levelIndex + (evo?.aoeRadiusBonus || 0);
        return Math.max(0, base * (evo?.aoeRadiusMultiplier || 1));
      }

      getSlowMultiplier() {
        const evo = this.getEvolutionConfig();
        const terrain = this.getTerrainEffects();
        let slow = this.config.slowMultiplier - (this.upgradeConfig.slowImprovementPerLevel || 0) * this.levelIndex;
        if (typeof evo?.slowMultiplierOverride === "number") slow = Math.min(slow, evo.slowMultiplierOverride);
        slow += terrain.slowMultiplierPenalty || 0;
        slow -= terrain.slowMultiplierBonus || 0;
        return clamp(slow, this.upgradeConfig.minSlowMultiplier ?? 0.1, 1);
      }

      getLureRange() {
        const evo = this.getEvolutionConfig();
        const terrain = this.getTerrainEffects();
        const base = (this.config.lureRange ?? Infinity) + (this.upgradeConfig.lureRangeBonusPerLevel || 0) * this.levelIndex + (evo?.lureRangeBonus || 0);
        if (!Number.isFinite(base)) return base;
        return Math.max(0, base * (evo?.lureRangeMultiplier || 1) * (terrain.rangeMultiplier || 1) + (terrain.rangeBonus || 0));
      }

      getTrapExplosionRadius() {
        const evo = this.getEvolutionConfig();
        const base = (this.config.trapExplosionRadius || 0) + (this.upgradeConfig.trapExplosionRadiusBonusPerLevel || 0) * this.levelIndex + (evo?.trapExplosionRadiusBonus || 0);
        return Math.max(0, base * (evo?.trapExplosionRadiusMultiplier || 1));
      }

      getTrapExplosionDamage() {
        const evo = this.getEvolutionConfig();
        const terrain = this.getTerrainEffects();
        const base = (this.config.trapExplosionDamage || 0) + (this.upgradeConfig.trapExplosionDamageBonusPerLevel || 0) * this.levelIndex + (evo?.trapExplosionDamageBonus || 0);
        return base * (evo?.trapExplosionDamageMultiplier || 1) * (terrain.trapExplosionDamageMultiplier || terrain.damageMultiplier || 1);
      }

      getUpgradeCost() {
        if (this.level >= this.maxLevel) return 0;
        const terrain = this.getTerrainEffects();
        const base = this.upgradeConfig.baseCost ?? Math.round(this.config.price * 0.75);
        const growth = this.upgradeConfig.costGrowth ?? 1.45;
        return Math.round(base * Math.pow(growth, this.levelIndex) * (terrain.upgradeCostMultiplier || 1));
      }

      getEvolutionCost(branchKey) {
        const option = this.config.evolutions?.[branchKey];
        if (!option) return 0;
        const terrain = this.getTerrainEffects();
        return Math.round((option.cost ?? this.config.price * 2) * (terrain.evolutionCostMultiplier || 1));
      }

      getSellPrice() {
        return Math.round(this.config.sellPrice + this.upgradeSpent * 0.55 + this.evolutionSpent * 0.45);
      }

      canUpgrade() {
        return this.level < this.maxLevel;
      }

      canEvolve() {
        return !this.evolutionKey && this.level >= this.maxLevel && this.getEvolutionOptions().length > 0;
      }

      upgrade() {
        if (!this.canUpgrade()) return false;
        const cost = this.getUpgradeCost();
        if (this.game.gold < cost) return false;
        this.game.gold -= cost;
        this.upgradeSpent += cost;
        this.level += 1;
        return true;
      }

      evolve(branchKey) {
        if (!this.canEvolve()) return false;
        const option = this.config.evolutions?.[branchKey];
        if (!option) return false;
        const cost = this.getEvolutionCost(branchKey);
        if (this.game.gold < cost) return false;
        this.game.gold -= cost;
        this.evolutionSpent += cost;
        this.evolutionKey = branchKey;
        return true;
      }

      update(dt) {
        this.pulse += dt * 4;
        this.lastTarget = null;
        this.lastAoe = null;
        this.lastPierce = null;
        this.lastExplosion = null;

        if (this.isTrap) return;

        const evo = this.getEvolutionConfig();
        const slow = this.getSlowMultiplier();
        const range = this.getRange();

        if (evo?.auraAttack) {
          let hitAny = false;
          for (const monster of this.game.monsters) {
            if (!monster.alive) continue;
            const d = distanceXY(this.x, this.y, monster.x, monster.y);
            if (d <= range + monster.radius * 0.25) {
              monster.takeDamage(this.getDamageAgainst(monster) * dt);
              if (slow < 1) monster.applySlow(slow);
              hitAny = true;
            }
          }
          if (hitAny) this.lastAoe = { x: this.x, y: this.y, radius: range, isAura: true };
          return;
        }

        const target = this.findNearestMonster();
        if (!target) return;

        this.lastTarget = target;
        if (evo?.pierceAttack) {
          const dir = normalize(target.x - this.x, target.y - this.y);
          const endX = this.x + dir.x * range;
          const endY = this.y + dir.y * range;
          const width = evo.pierceWidth || 24;
          this.lastPierce = { x1: this.x, y1: this.y, x2: endX, y2: endY, width };
          for (const monster of this.game.monsters) {
            if (!monster.alive) continue;
            const dFromTower = distanceXY(this.x, this.y, monster.x, monster.y);
            if (dFromTower > range + monster.radius * 0.25) continue;
            const lineD = distancePointToSegment(monster.x, monster.y, this.x, this.y, endX, endY);
            if (lineD <= width + monster.radius * 0.22) {
              monster.takeDamage(this.getDamageAgainst(monster) * dt);
              if (slow < 1) monster.applySlow(slow);
            }
          }
          return;
        }

        if (this.config.isAoe) {
          const aoeRadius = this.getAoeRadius();
          this.lastAoe = { x: target.x, y: target.y, radius: aoeRadius };
          for (const monster of this.game.monsters) {
            if (!monster.alive) continue;
            if (distanceXY(monster.x, monster.y, target.x, target.y) <= aoeRadius + monster.radius * 0.25) {
              monster.takeDamage(this.getDamageAgainst(monster) * dt);
              if (slow < 1) monster.applySlow(slow);
            }
          }
        } else {
          target.takeDamage(this.getDamageAgainst(target) * dt);
          if (slow < 1) target.applySlow(slow);
        }
      }

      findNearestMonster() {
        const range = this.getRange();
        const evo = this.getEvolutionConfig();
        const chooseNearest = (predicate) => {
          let best = null;
          let bestDistance = Infinity;
          for (const monster of this.game.monsters) {
            if (!monster.alive || !predicate(monster)) continue;
            const d = distanceXY(this.x, this.y, monster.x, monster.y);
            if (d <= range + monster.radius * 0.25 && d < bestDistance) {
              best = monster;
              bestDistance = d;
            }
          }
          return best;
        };

        if (evo?.prioritizeCarrier) {
          const carrier = chooseNearest(monster => monster.carryingTreasure);
          if (carrier) return carrier;
        }
        if (evo?.prioritizeBoss) {
          const boss = chooseNearest(monster => Boolean(monster.config.isBoss));
          if (boss) return boss;
        }
        return chooseNearest(() => true);
      }

      drawLaser(ctx) {
        const color = this.getDisplayColor();
        if (this.lastPierce) {
          ctx.save();
          ctx.globalAlpha = 0.78;
          ctx.strokeStyle = color;
          ctx.lineWidth = Math.max(4, this.lastPierce.width * 0.35);
          ctx.shadowColor = color;
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.moveTo(this.lastPierce.x1, this.lastPierce.y1);
          ctx.lineTo(this.lastPierce.x2, this.lastPierce.y2);
          ctx.stroke();
          ctx.globalAlpha = 0.34;
          ctx.lineWidth = this.lastPierce.width * 2;
          ctx.stroke();
          ctx.restore();
          return;
        }

        if (this.lastAoe?.isAura) {
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.58;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.setLineDash([10, 7]);
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          return;
        }

        if (!this.lastTarget || !this.lastTarget.alive || this.isTrap) return;
        ctx.save();
        ctx.globalAlpha = 0.88;
        ctx.strokeStyle = this.config.isAoe ? this.getDisplayColor() : (this.getSlowMultiplier() < 1 ? "#85f0c6" : this.getDisplayColor());
        ctx.lineWidth = GAME_CONFIG.laserWidth + (this.level - 1) * 0.5 + (this.evolutionKey ? 0.8 : 0);
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.lastTarget.x, this.lastTarget.y);
        ctx.stroke();

        if (this.lastAoe) {
          ctx.globalAlpha = 0.26;
          ctx.fillStyle = this.getDisplayColor();
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.72;
          ctx.strokeStyle = this.getDisplayColor();
          ctx.lineWidth = 2;
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(this.lastAoe.x, this.lastAoe.y, this.lastAoe.radius, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      draw(ctx, selected = false) {
        const r = GAME_CONFIG.cellSize * 0.28;
        const color = this.getDisplayColor();
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.isTrap) {
          const pulseR = r + Math.sin(this.pulse) * 4;
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(0, 0, pulseR + 18 + this.levelIndex * 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        if (this.evolutionKey) {
          ctx.globalAlpha = 0.22;
          ctx.strokeStyle = color;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(0, 0, r + 8 + Math.sin(this.pulse) * 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = 8;
        ctx.fillStyle = color;
        ctx.strokeStyle = selected ? "#fff" : "rgba(255,255,255,0.72)";
        ctx.lineWidth = selected ? 4 : 2;

        ctx.beginPath();
        if (this.config.isAoe) {
          for (let i = 0; i < 6; i++) {
            const angle = Math.PI / 6 + i * Math.PI / 3;
            const px = Math.cos(angle) * (r + 4);
            const py = Math.sin(angle) * (r + 4);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
        } else if (this.isTrap) {
          for (let i = 0; i < 5; i++) {
            const outer = -Math.PI / 2 + i * Math.PI * 2 / 5;
            const inner = outer + Math.PI / 5;
            const ox = Math.cos(outer) * (r + 7);
            const oy = Math.sin(outer) * (r + 7);
            const ix = Math.cos(inner) * (r * 0.45);
            const iy = Math.sin(inner) * (r * 0.45);
            if (i === 0) ctx.moveTo(ox, oy);
            else ctx.lineTo(ox, oy);
            ctx.lineTo(ix, iy);
          }
          ctx.closePath();
        } else {
          ctx.arc(0, 0, r, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#102034";
        ctx.font = this.getDisplayIcon().length > 1 ? "900 13px system-ui, sans-serif" : "900 18px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.getDisplayIcon(), 0, 1);

        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.font = "900 11px system-ui, sans-serif";
        ctx.fillText(this.evolutionKey ? "进化" : `Lv.${this.level}`, 0, r + 14);

        ctx.restore();

        if (selected) {
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = color;
          ctx.beginPath();
          const selectedRadius = this.isTrap ? this.getLureRange() : this.getRange();
          ctx.arc(this.x, this.y, selectedRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.65;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y, selectedRadius, 0, Math.PI * 2);
          ctx.stroke();
          if (this.isTrap && this.getTrapExplosionRadius() > 0) {
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = "#ffd166";
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.getTrapExplosionRadius(), 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
      }
    }
