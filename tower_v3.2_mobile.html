    class UIManager {
      constructor(game) {
        this.game = game;
        this.els = {
          canvasWrap: document.getElementById("canvasWrap"),
          levelText: document.getElementById("levelText"),
          goldText: document.getElementById("goldText"),
          bestLevelText: document.getElementById("bestLevelText"),
          timeText: document.getElementById("timeText"),
          statusText: document.getElementById("statusText"),
          messageText: document.getElementById("messageText"),
          startBtn: document.getElementById("startBtn"),
          pauseBtn: document.getElementById("pauseBtn"),
          resumeBtn: document.getElementById("resumeBtn"),
          restartBtn: document.getElementById("restartBtn"),
          magnetBtn: document.getElementById("magnetBtn"),
          cancelBuildBtn: document.getElementById("cancelBuildBtn"),
          towerList: document.getElementById("towerList"),
          buildModeText: document.getElementById("buildModeText"),
          towerInfo: document.getElementById("towerInfo"),
          upgradeBtn: document.getElementById("upgradeBtn"),
          evolveBtnA: document.getElementById("evolveBtnA"),
          evolveBtnB: document.getElementById("evolveBtnB"),
          sellBtn: document.getElementById("sellBtn"),
          clearSelectBtn: document.getElementById("clearSelectBtn")
        };

        this.towerButtons = new Map();
        this.createTowerButtons();
        this.bindEvents();
      }

      createTowerButtons() {
        this.els.towerList.innerHTML = "";
        for (const [key, cfg] of Object.entries(TOWER_TYPES)) {
          const btn = document.createElement("button");
          btn.className = "tower-button";
          btn.type = "button";
          btn.dataset.towerKey = key;
          btn.innerHTML = `
            <span class="tower-icon" style="color:${cfg.color}">${cfg.icon}</span>
            <span class="tower-main">
              <span class="tower-top">
                <span class="tower-name">${cfg.name}</span>
                <span class="tower-price">${cfg.price}金</span>
              </span>
              <span class="tower-desc">${cfg.description}</span>
            </span>
          `;
          btn.addEventListener("click", () => this.game.enterBuildMode(key));
          this.els.towerList.appendChild(btn);
          this.towerButtons.set(key, btn);
        }
      }

      bindEvents() {
        this.els.startBtn.addEventListener("click", () => this.game.start());
        this.els.pauseBtn.addEventListener("click", () => this.game.pause());
        this.els.resumeBtn.addEventListener("click", () => this.game.resume());
        this.els.restartBtn.addEventListener("click", () => this.game.restart(true));
        this.els.magnetBtn.addEventListener("click", () => this.game.useMagnet());
        this.els.cancelBuildBtn.addEventListener("click", () => this.game.exitBuildMode());
        this.els.upgradeBtn.addEventListener("click", () => this.game.upgradeSelectedTower());
        this.els.evolveBtnA.addEventListener("click", () => this.game.evolveSelectedTower(0));
        this.els.evolveBtnB.addEventListener("click", () => this.game.evolveSelectedTower(1));
        this.els.sellBtn.addEventListener("click", () => this.game.sellSelectedTower());
        this.els.clearSelectBtn.addEventListener("click", () => this.game.clearSelectedTower());
      }

      update() {
        const g = this.game;
        this.els.levelText.textContent = g.level;
        this.els.goldText.textContent = Math.floor(g.gold);
        this.els.bestLevelText.textContent = g.bestLevel;
        this.els.timeText.textContent = formatTime(g.gameTime);
        this.els.statusText.textContent = STATUS_TEXT[g.status];
        this.els.messageText.textContent = g.message;
        this.els.buildModeText.textContent = g.buildModeTowerKey ? `放置：${TOWER_TYPES[g.buildModeTowerKey].name}` : "";

        this.els.startBtn.disabled = g.status !== GAME_STATUS.NOT_STARTED;
        this.els.pauseBtn.disabled = g.status !== GAME_STATUS.RUNNING;
        this.els.resumeBtn.disabled = g.status !== GAME_STATUS.PAUSED;
        this.els.magnetBtn.textContent = `吸铁石 ${GAME_CONFIG.magnetCost}金`;
        this.els.magnetBtn.disabled = g.status === GAME_STATUS.FAILED || g.gold < GAME_CONFIG.magnetCost || g.treasure.state !== "dropped";
        this.els.cancelBuildBtn.disabled = !g.buildModeTowerKey;
        this.els.clearSelectBtn.disabled = !g.selectedTower;

        const selected = g.selectedTower;
        const upgradeCost = selected ? selected.getUpgradeCost() : 0;
        this.els.upgradeBtn.textContent = selected && selected.canUpgrade()
          ? `升级 ${upgradeCost}金`
          : selected && selected.level >= selected.maxLevel
            ? "满级"
            : "升级";
        this.els.upgradeBtn.disabled = !selected || !selected.canUpgrade() || g.gold < upgradeCost || g.status === GAME_STATUS.FAILED;
        this.els.sellBtn.textContent = selected ? `出售 ${selected.getSellPrice()}金` : "出售";
        this.els.sellBtn.disabled = !selected;
        this.updateEvolutionButtons(selected);

        for (const [key, btn] of this.towerButtons.entries()) {
          const minCost = g.getMinimumAvailablePlacementCost(key);
          btn.classList.toggle("active", g.buildModeTowerKey === key);
          btn.disabled = g.status === GAME_STATUS.FAILED || minCost === Infinity || g.gold < minCost;
          const priceEl = btn.querySelector?.(".tower-price");
          if (priceEl) priceEl.textContent = minCost === Infinity ? `${TOWER_TYPES[key].price}金` : `${minCost}金起`;
        }

        this.updateTowerInfo();
      }

      updateEvolutionButtons(tower) {
        const buttons = [this.els.evolveBtnA, this.els.evolveBtnB];
        const options = tower ? tower.getEvolutionOptions() : [];
        buttons.forEach((btn, index) => {
          const option = options[index];
          if (!tower || !option) {
            btn.textContent = index === 0 ? "进化 A" : "进化 B";
            btn.disabled = true;
            return;
          }
          const cost = tower.getEvolutionCost(option.key);
          btn.textContent = tower.evolutionKey === option.key
            ? `已进化`
            : `${option.name.replace(/塔/g, "")} ${cost}金`;
          btn.disabled = !tower.canEvolve() || this.game.gold < cost || this.game.status === GAME_STATUS.FAILED;
        });
      }

      updateTowerInfo() {
        const tower = this.game.selectedTower;
        if (!tower) {
          this.els.towerInfo.textContent = "未选中。点画面中的塔后，可在上方控制区升级、进化、出售。";
          return;
        }

        const terrain = this.game.getTerrainAtCell(tower.col, tower.row);
        const terrainText = terrain ? `${terrain.name}：${terrain.description}` : "普通地面";
        const evo = tower.getEvolutionConfig();
        const evoText = evo
          ? `已进化：${evo.name}`
          : tower.canEvolve()
            ? `可进化：${tower.getEvolutionOptions().map(o => `${o.name}${tower.getEvolutionCost(o.key)}`).join(" / ")}`
            : `进化：Lv.${tower.maxLevel} 解锁`;
        const actionText = tower.canUpgrade()
          ? `升级 ${tower.getUpgradeCost()}金`
          : tower.canEvolve()
            ? "请选择进化分支"
            : "满级";
        const combatText = tower.isTrap
          ? `诱导 ${Math.round(tower.getLureRange())} · 爆炸 ${Math.round(tower.getTrapExplosionRadius())}/${Math.round(tower.getTrapExplosionDamage())}`
          : `秒伤 ${round1(tower.getDamagePerSecond())} · 射程 ${Math.round(tower.getRange())}${tower.config.isAoe ? ` · AOE ${Math.round(tower.getAoeRadius())}` : ""}${tower.getSlowMultiplier() < 1 ? ` · 减速 ${Math.round(tower.getSlowMultiplier() * 100)}%` : ""}`;

        this.els.towerInfo.innerHTML = `
          <strong style="color:${tower.getDisplayColor()}">${tower.getDisplayName()} Lv.${tower.level}/${tower.maxLevel}</strong>
          · ${actionText} · 出售 ${tower.getSellPrice()}金<br>
          ${combatText}<br>
          地形：${terrainText}<br>
          ${evoText}
        `;
      }
    }
    // =========================
    // 7. 游戏主类
    // =========================
    class Game {
      constructor() {
        this.canvas = document.getElementById("gameCanvas");
        this.ctx = this.canvas.getContext("2d");

        this.worldWidth = GAME_CONFIG.gridCols * GAME_CONFIG.cellSize;
        this.worldHeight = GAME_CONFIG.gridRows * GAME_CONFIG.cellSize;
        document.getElementById("canvasWrap").style.aspectRatio = `${GAME_CONFIG.gridCols} / ${GAME_CONFIG.gridRows}`;

        this.nestPosition = this.cellCenter(0, 0);
        this.terrainByCell = this.buildTerrainLookup();
        this.bestLevel = Number(localStorage.getItem(GAME_CONFIG.localStorageKey) || 1);
        this.ui = new UIManager(this);

        this.lastTimestamp = 0;
        this.resizeObserver = null;
        this.pointer = { x: 0, y: 0, active: false };

        this.resetState();
        this.bindCanvasEvents();
        this.bindResize();
        this.resizeCanvas();
        this.loop(0);
      }

      resetState() {
        this.status = GAME_STATUS.NOT_STARTED;
        this.gameTime = 0;
        this.level = 1;
        this.gold = GAME_CONFIG.initialGold ?? TOWER_TYPES.normal.price * 2;
        this.monsters = [];
        this.towers = [];
        this.floatingTexts = [];
        this.flags = [];
        this.nestIdCounter = 0;
        this.nests = [this.createNest(this.nestPosition.x, this.nestPosition.y, true)];
        this.treasure = new Treasure(this);
        this.spawnedBossLevels = new Set();
        this.spawnedScoutLevels = new Set();
        this.bossSpawnEvents = 0;
        this.nextBossLevel = GAME_CONFIG.firstBossLevel || GAME_CONFIG.bossEveryLevels;
        this.nextScoutLevel = GAME_CONFIG.scoutFirstLevel || 6;
        this.pathVersion = 0;
        this.buildModeTowerKey = null;
        this.selectedTower = null;
        this.message = "选择“开始游戏”，然后购买并放置防御塔。";
        this.messageTimer = 0;
      }

      createNest(x, y, isMain = false) {
        const spawnTimers = {};
        for (const [key, cfg] of Object.entries(MONSTER_TYPES)) {
          if (!cfg.isBoss && !cfg.isScout) spawnTimers[key] = 0;
        }
        return {
          id: ++this.nestIdCounter,
          x,
          y,
          isMain,
          age: isMain ? Infinity : 0,
          localLevel: 1,
          spawnPower: isMain ? 1 : 0,
          spawnTimers,
          pulse: Math.random() * Math.PI * 2
        };
      }

      getMainNest() {
        return this.nests?.find(nest => nest.isMain) || { x: this.nestPosition.x, y: this.nestPosition.y, isMain: true, localLevel: this.level, spawnPower: 1 };
      }

      getMonsterSpawnLevel(nest, typeKey) {
        const cfg = MONSTER_TYPES[typeKey];
        if (cfg?.isBoss || nest?.isMain) return this.level;
        return Math.max(1, nest?.localLevel || 1);
      }

      updatePathVersion() {
        this.pathVersion = (this.pathVersion || 0) + 1;
      }

      bindResize() {
        this.resizeObserver = new ResizeObserver(() => this.resizeCanvas());
        this.resizeObserver.observe(this.canvas);
        window.addEventListener("resize", () => this.resizeCanvas());
      }

      resizeCanvas() {
        const rect = this.canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        const width = Math.max(1, Math.round(rect.width * dpr));
        const height = Math.max(1, Math.round(rect.height * dpr));
        if (this.canvas.width !== width || this.canvas.height !== height) {
          this.canvas.width = width;
          this.canvas.height = height;
        }
        this.ctx.setTransform(width / this.worldWidth, 0, 0, height / this.worldHeight, 0, 0);
      }

      bindCanvasEvents() {
        this.canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          const point = this.clientToWorld(event.clientX, event.clientY);
          this.pointer = { ...point, active: true };
          this.handleCanvasClick(point.x, point.y);
        }, { passive: false });

        this.canvas.addEventListener("pointermove", (event) => {
          const point = this.clientToWorld(event.clientX, event.clientY);
          this.pointer = { ...point, active: true };
        });

        this.canvas.addEventListener("pointerleave", () => {
          this.pointer.active = false;
        });
      }

      clientToWorld(clientX, clientY) {
        const rect = this.canvas.getBoundingClientRect();
        return {
          x: clamp((clientX - rect.left) / rect.width * this.worldWidth, 0, this.worldWidth),
          y: clamp((clientY - rect.top) / rect.height * this.worldHeight, 0, this.worldHeight)
        };
      }

      cellCenter(col, row) {
        return {
          x: (col + 0.5) * GAME_CONFIG.cellSize,
          y: (row + 0.5) * GAME_CONFIG.cellSize
        };
      }

      pointToCell(x, y) {
        return {
          col: clamp(Math.floor(x / GAME_CONFIG.cellSize), 0, GAME_CONFIG.gridCols - 1),
          row: clamp(Math.floor(y / GAME_CONFIG.cellSize), 0, GAME_CONFIG.gridRows - 1)
        };
      }

      buildTerrainLookup() {
        const lookup = new Map();
        for (const item of TERRAIN_MAP) {
          if (!TERRAIN_TYPES[item.type]) continue;
          if (item.col === 0 && item.row === 0) continue;
          if (item.col === GAME_CONFIG.gridCols - 1 && item.row === GAME_CONFIG.gridRows - 1) continue;
          lookup.set(cellKey(item.col, item.row), item.type);
        }
        return lookup;
      }

      getTerrainKeyAtCell(col, row) {
        return this.terrainByCell?.get(cellKey(col, row)) || null;
      }

      getTerrainAtCell(col, row) {
        const key = this.getTerrainKeyAtCell(col, row);
        return key ? TERRAIN_TYPES[key] : null;
      }

      getTerrainTowerEffects(col, row) {
        return this.getTerrainAtCell(col, row)?.tower || {};
      }

      getTowerPlacementCost(typeKey, col, row) {
        const cfg = TOWER_TYPES[typeKey];
        if (!cfg) return Infinity;
        const terrain = this.getTerrainTowerEffects(col, row);
        return Math.max(1, Math.round(cfg.price * (terrain.priceMultiplier || 1)));
      }

      getMinimumAvailablePlacementCost(typeKey) {
        let min = Infinity;
        for (let row = 0; row < GAME_CONFIG.gridRows; row++) {
          for (let col = 0; col < GAME_CONFIG.gridCols; col++) {
            if (!this.canPlaceTower(col, row)) continue;
            min = Math.min(min, this.getTowerPlacementCost(typeKey, col, row));
          }
        }
        return min;
      }

      start() {
        if (this.status !== GAME_STATUS.NOT_STARTED) return;
        this.status = GAME_STATUS.RUNNING;
        this.showMessage("游戏开始！非对角线增益地形适合建核心塔，对角线附近的高强度减益会明显削弱塔。", true);
      }

      pause() {
        if (this.status !== GAME_STATUS.RUNNING) return;
        this.status = GAME_STATUS.PAUSED;
        this.showMessage("游戏已暂停。", true);
      }

      resume() {
        if (this.status !== GAME_STATUS.PAUSED) return;
        this.status = GAME_STATUS.RUNNING;
        this.showMessage("游戏继续。", true);
      }

      restart(startImmediately = false) {
        this.resetState();
        if (startImmediately) this.start();
      }

      failGame(reason) {
        if (this.status === GAME_STATUS.FAILED) return;
        this.status = GAME_STATUS.FAILED;
        this.exitBuildMode();
        this.updateBestLevel();
        this.showMessage(`${reason} 最终等级：${this.level}。点击“重新开始”再试一次。`, true);
      }

      updateBestLevel() {
        if (this.level > this.bestLevel) {
          this.bestLevel = this.level;
          localStorage.setItem(GAME_CONFIG.localStorageKey, String(this.bestLevel));
        }
      }

      showMessage(text, sticky = false) {
        this.message = text;
        this.messageTimer = sticky ? Infinity : GAME_CONFIG.messageDuration;
      }

      enterBuildMode(typeKey) {
        const cfg = TOWER_TYPES[typeKey];
        if (!cfg) return;
        if (this.status === GAME_STATUS.FAILED) {
          this.showMessage("游戏失败后不能继续放置，请重新开始。");
          return;
        }
        const minCost = this.getMinimumAvailablePlacementCost(typeKey);
        if (minCost === Infinity) {
          this.showMessage("没有可放置防御塔的空格了。");
          return;
        }
        if (this.gold < minCost) {
          this.showMessage(`金币不足，至少需要 ${minCost} 金才能放置 ${cfg.name}。`);
          return;
        }
        this.buildModeTowerKey = typeKey;
        this.selectedTower = null;
        this.showMessage(`请选择一个空格放置 ${cfg.name}。不同地形会改变价格、伤害或射程。`, true);
      }

      exitBuildMode() {
        this.buildModeTowerKey = null;
        if (this.status !== GAME_STATUS.FAILED) {
          this.showMessage("已退出放置模式。", false);
        }
      }

      clearSelectedTower() {
        this.selectedTower = null;
      }

      upgradeSelectedTower() {
        const tower = this.selectedTower;
        if (!tower) return;
        if (!tower.canUpgrade()) {
          this.showMessage(`${tower.getDisplayName()} 已经满级，可以选择进化分支。`);
          return;
        }
        const cost = tower.getUpgradeCost();
        if (this.gold < cost) {
          this.showMessage(`金币不足，升级需要 ${cost} 金。`);
          return;
        }
        tower.upgrade();
        this.updatePathVersion();
        this.spawnFloatingText(`Lv.${tower.level}`, tower.x, tower.y - 32, tower.getDisplayColor(), 1.2);
        this.showMessage(`${tower.getDisplayName()} 升级到 Lv.${tower.level}，花费 ${cost} 金。`);
      }

      evolveSelectedTower(optionIndex) {
        const tower = this.selectedTower;
        if (!tower) return;
        const option = tower.getEvolutionOptions()[optionIndex];
        if (!option) return;
        if (!tower.canEvolve()) {
          if (tower.evolutionKey) this.showMessage(`${tower.getDisplayName()} 已经完成进化。`);
          else this.showMessage(`${tower.config.name} 需要先升到 Lv.${tower.maxLevel} 才能进化。`);
          return;
        }
        const cost = tower.getEvolutionCost(option.key);
        if (this.gold < cost) {
          this.showMessage(`金币不足，进化为 ${option.name} 需要 ${cost} 金。`);
          return;
        }
        tower.evolve(option.key);
        this.updatePathVersion();
        this.spawnFloatingText(option.name, tower.x, tower.y - 38, tower.getDisplayColor(), 1.5);
        this.showMessage(`${tower.config.name} 已进化为 ${option.name}：${option.description}`);
      }

      sellSelectedTower() {
        if (!this.selectedTower) return;
        const tower = this.selectedTower;
        const sellPrice = tower.getSellPrice();
        this.gold += sellPrice;
        this.towers = this.towers.filter(t => t !== tower);
        this.updatePathVersion();
        this.selectedTower = null;
        this.showMessage(`已出售 ${tower.getDisplayName()}，获得 ${sellPrice} 金。`);
      }

      useMagnet() {
        if (this.status === GAME_STATUS.FAILED) return;
        if (this.treasure.state === "home") {
          this.showMessage("宝物还在初始位置，不需要使用吸铁石。");
          return;
        }
        if (this.treasure.state === "carried") {
          this.showMessage("吸铁石只能吸回被击杀怪物掉落的宝物，怪物搬运中不能使用。");
          return;
        }
        if (this.gold < GAME_CONFIG.magnetCost) {
          this.showMessage(`金币不足，吸铁石需要 ${GAME_CONFIG.magnetCost} 金。`);
          return;
        }
        this.gold -= GAME_CONFIG.magnetCost;
        const success = this.treasure.magnetBack();
        if (success) {
          this.showMessage(`吸铁石生效！掉落的宝物已回到右下角，消耗 ${GAME_CONFIG.magnetCost} 金。`);
        }
      }

      handleCanvasClick(x, y) {
        if (this.buildModeTowerKey) {
          this.tryPlaceTower(x, y);
          return;
        }

        const tower = this.getTowerAtPoint(x, y);
        if (tower) {
          this.selectedTower = tower;
          this.showMessage(`已选中 ${tower.getDisplayName()} Lv.${tower.level}。`);
          return;
        }

        this.selectedTower = null;
        const cell = this.pointToCell(x, y);
        const terrain = this.getTerrainAtCell(cell.col, cell.row);
        if (terrain) {
          const prefix = terrain.kind === "buff" ? "增益地形" : "减益地形";
          this.showMessage(`${prefix}：${terrain.name}。${terrain.description}`);
        }
      }

      tryPlaceTower(x, y) {
        const typeKey = this.buildModeTowerKey;
        const cfg = TOWER_TYPES[typeKey];
        const cell = this.pointToCell(x, y);

        if (!this.canPlaceTower(cell.col, cell.row)) {
          this.showMessage("这个格子不能放塔：已被占用，或位于巢穴/宝物初始点。", true);
          return;
        }

        const cost = this.getTowerPlacementCost(typeKey, cell.col, cell.row);
        const terrain = this.getTerrainAtCell(cell.col, cell.row);
        if (this.gold < cost) {
          const terrainText = terrain ? `（${terrain.name}：${terrain.description}）` : "";
          this.showMessage(`金币不足，在此处放置 ${cfg.name} 需要 ${cost} 金${terrainText}。`, true);
          return;
        }

        const tower = new Tower(this, typeKey, cell.col, cell.row, cost);
        this.towers.push(tower);
        this.updatePathVersion();
        this.gold -= cost;
        this.selectedTower = tower;
        this.buildModeTowerKey = null;
        const terrainText = terrain ? `，地形：${terrain.name}（${terrain.description}）` : "";
        this.showMessage(`已放置 ${cfg.name}，花费 ${cost} 金${terrainText}。`);
      }

      canPlaceTower(col, row) {
        if (col === 0 && row === 0) return false;
        if (col === GAME_CONFIG.gridCols - 1 && row === GAME_CONFIG.gridRows - 1) return false;
        if (this.nests?.some(nest => {
          const cell = this.pointToCell(nest.x, nest.y);
          return cell.col === col && cell.row === row;
        })) return false;
        return !this.towers.some(tower => tower.col === col && tower.row === row);
      }

      getTowerAtPoint(x, y) {
        const pickRadius = GAME_CONFIG.cellSize * 0.42;
        for (let i = this.towers.length - 1; i >= 0; i--) {
          const tower = this.towers[i];
          if (distanceXY(x, y, tower.x, tower.y) <= pickRadius) return tower;
        }
        return null;
      }

      getTargetForMonster(monster) {
        if (monster.carryingTreasure) {
          const nest = monster.spawnNest || this.getMainNest();
          return { x: nest.x, y: nest.y, kind: "nest", nest };
        }

        // 侦查怪只按低伤害路径找宝物，不被诱捕塔的目标吸引改写路径。
        if (!monster.config.isScout) {
          const trap = this.getNearestTrap(monster.x, monster.y);
          if (trap) {
            return { x: trap.x, y: trap.y, kind: "trap", tower: trap };
          }
        }

        return { x: this.treasure.x, y: this.treasure.y, kind: "treasure" };
      }

      getNearestTrap(x, y) {
        let best = null;
        let bestDistance = Infinity;
        for (const tower of this.towers) {
          if (!tower.isTrap) continue;
          const d = distanceXY(x, y, tower.x, tower.y);
          if (d <= tower.getLureRange() && d < bestDistance) {
            best = tower;
            bestDistance = d;
          }
        }
        return best;
      }

      placeFlag(x, y) {
        this.flags.push({
          x: clamp(x, 12, this.worldWidth - 12),
          y: clamp(y, 12, this.worldHeight - 12),
          createdAt: this.gameTime,
          strength: 1
        });
        while (this.flags.length > GAME_CONFIG.flagMaxCount) this.flags.shift();
        this.spawnFloatingText("旗帜", x, y - 18, "#ffcf66", 1.2);
        this.showMessage("侦查怪死亡后留下旗帜，其他怪物会略微受旗帜吸引。生产型 Boss 受旗帜影响更强。 ");
      }

      getFlagAttractionVector(x, y) {
        if (!this.flags?.length) return { x: 0, y: 0 };
        let vx = 0;
        let vy = 0;
        for (const flag of this.flags) {
          const d = distanceXY(x, y, flag.x, flag.y);
          if (d <= 1 || d > GAME_CONFIG.flagAttractionRadius) continue;
          const strength = (flag.strength || 1) / Math.max(80, d);
          vx += (flag.x - x) / d * strength;
          vy += (flag.y - y) / d * strength;
        }
        return normalize(vx, vy);
      }

      getScoutCellThreat(x, y, scout) {
        let threat = 0;
        const cell = this.pointToCell(x, y);
        for (const tower of this.towers) {
          const d = distanceXY(x, y, tower.x, tower.y);
          if (tower.isTrap) {
            const dangerRadius = Math.max(GAME_CONFIG.trapTriggerRadius + scout.radius * 0.5, tower.getTrapExplosionRadius());
            if (d <= dangerRadius) threat += 80;
            else if (d <= tower.getLureRange()) threat += 4 * (1 - d / Math.max(1, tower.getLureRange()));
            continue;
          }

          const range = tower.getRange();
          if (d <= range + GAME_CONFIG.cellSize * 0.22) {
            const edgeFactor = clamp((range + GAME_CONFIG.cellSize * 0.22 - d) / Math.max(1, range), 0, 1);
            const damage = Math.max(0, tower.getDamageAgainst(scout));
            const aoeBonus = tower.config.isAoe || tower.getEvolutionConfig()?.auraAttack ? 1.2 : 1;
            const slowPenalty = tower.getSlowMultiplier() < 1 ? (1 - tower.getSlowMultiplier()) * 8 : 0;
            threat += (damage / 18) * (0.45 + edgeFactor * 0.75) * aoeBonus + slowPenalty;
          }

          if (tower.col === cell.col && tower.row === cell.row) {
            threat += 6;
          }
        }
        return threat;
      }

      findLowestDamagePath(scout, target) {
        const cols = GAME_CONFIG.gridCols;
        const rows = GAME_CONFIG.gridRows;
        const start = this.pointToCell(scout.x, scout.y);
        const goal = this.pointToCell(target.x, target.y);
        const idx = (col, row) => row * cols + col;
        const total = cols * rows;
        const dist = Array(total).fill(Infinity);
        const prev = Array(total).fill(-1);
        const visited = Array(total).fill(false);
        const startIdx = idx(start.col, start.row);
        const goalIdx = idx(goal.col, goal.row);
        dist[startIdx] = 0;

        for (let iter = 0; iter < total; iter++) {
          let current = -1;
          let best = Infinity;
          for (let i = 0; i < total; i++) {
            if (!visited[i] && dist[i] < best) {
              best = dist[i];
              current = i;
            }
          }
          if (current < 0 || current === goalIdx) break;
          visited[current] = true;
          const col = current % cols;
          const row = Math.floor(current / cols);
          const neighbors = [
            [col + 1, row],
            [col - 1, row],
            [col, row + 1],
            [col, row - 1]
          ];
          for (const [nc, nr] of neighbors) {
            if (nc < 0 || nr < 0 || nc >= cols || nr >= rows) continue;
            const ni = idx(nc, nr);
            if (visited[ni]) continue;
            const p = this.cellCenter(nc, nr);
            const threat = this.getScoutCellThreat(p.x, p.y, scout);
            const stepCost = 1 + threat;
            const nextCost = dist[current] + stepCost;
            if (nextCost < dist[ni]) {
              dist[ni] = nextCost;
              prev[ni] = current;
            }
          }
        }

        if (!Number.isFinite(dist[goalIdx])) return [target];
        const indices = [];
        let cur = goalIdx;
        while (cur !== -1 && cur !== startIdx) {
          indices.push(cur);
          cur = prev[cur];
        }
        indices.reverse();
        const points = indices.map(i => this.cellCenter(i % cols, Math.floor(i / cols)));
        const last = points[points.length - 1];
        if (!last || distanceXY(last.x, last.y, target.x, target.y) > 6) {
          points.push({ x: target.x, y: target.y });
        }
        return points;
      }

      triggerTrap(tower, monster) {
        if (!tower || !monster.alive) return;
        this.towers = this.towers.filter(t => t !== tower);
        this.updatePathVersion();
        if (this.selectedTower === tower) this.selectedTower = null;

        if (monster.config.isBoss) {
          const damage = monster.config.trapDamageTaken + tower.getTrapExplosionDamage();
          monster.takeDamage(damage);
          this.spawnFloatingText("Boss 受创!", tower.x, tower.y - 12, "#ff75d8", 1.4);
          this.showMessage(`${tower.getDisplayName()} 触发：Boss 摧毁诱捕塔并受到 ${Math.round(damage)} 点伤害。`);
        } else {
          monster.die();
          this.spawnFloatingText("诱捕!", tower.x, tower.y - 12, "#ff75d8", 1.2);
          this.showMessage(`${tower.getDisplayName()} 触发：消灭一只 ${monster.config.name}，诱捕塔消失。`);
        }

        this.applyTrapExplosion(tower, monster);
      }

      applyTrapExplosion(tower, primaryMonster) {
        const radius = tower.getTrapExplosionRadius();
        const damage = tower.getTrapExplosionDamage();
        if (radius <= 0 || damage <= 0) return;
        for (const monster of this.monsters) {
          if (!monster.alive || monster === primaryMonster) continue;
          const d = distanceXY(monster.x, monster.y, tower.x, tower.y);
          if (d <= radius + monster.radius * 0.25) {
            monster.takeDamage(damage);
          }
        }
        this.spawnFloatingText("爆炸", tower.x, tower.y + 18, "#ffd166", 1.1);
      }

      spawnFloatingText(text, x, y, color, maxLife = 1) {
        this.floatingTexts.push({ text, x, y, color, life: maxLife, maxLife });
      }

      update(dt) {
        if (this.status === GAME_STATUS.RUNNING) {
          this.gameTime += dt;
          const oldLevel = this.level;
          this.level = Math.floor(this.gameTime / GAME_CONFIG.levelDuration) + 1;
          if (this.level > oldLevel) {
            this.handleLevelUp(oldLevel, this.level);
          }

          this.updateSpawning(dt);

          for (const monster of this.monsters) monster.beginFrame();
          for (const tower of this.towers) tower.update(dt);
          this.removeDeadMonsters();

          for (const monster of this.monsters) monster.update(dt);
          this.treasure.update(dt);
          this.removeDeadMonsters();
        }

        this.updateFloatingTexts(dt);
        this.updateMessageTimer(dt);
        this.ui.update();
      }

      handleLevelUp(oldLevel, newLevel) {
        this.showMessage(`等级提升到 ${newLevel}！侦查怪、Boss 与新巢穴都会逐步增加压力。`);
        for (let level = oldLevel + 1; level <= newLevel; level++) {
          while (level >= this.nextBossLevel) {
            const bossLevel = this.nextBossLevel;
            this.spawnBoss(bossLevel);
            this.nextBossLevel = bossLevel + this.getBossIntervalForLevel(bossLevel + 1);
          }
          while (level >= this.nextScoutLevel) {
            const scoutLevel = this.nextScoutLevel;
            this.spawnScoutEvent(scoutLevel);
            this.nextScoutLevel = scoutLevel + this.getScoutIntervalForLevel(scoutLevel + 1);
          }
        }
      }

      getBossIntervalForLevel(level) {
        let interval = GAME_CONFIG.bossEveryLevels || 5;
        for (const stage of GAME_CONFIG.bossIntervalStages || []) {
          if (level >= stage.minLevel) interval = stage.interval;
        }
        return Math.max(1, interval);
      }

      getBossSpawnCount(level) {
        const extraEvery = GAME_CONFIG.bossExtraCountEveryLevels;
        if (!Number.isFinite(extraEvery) || extraEvery <= 0) return 1;
        const extra = Math.floor(Math.max(0, level - (GAME_CONFIG.firstBossLevel || 1)) / extraEvery);
        return clamp(1 + extra, 1, GAME_CONFIG.maxBossesPerSpawn || 1);
      }

      shouldSpawnProducerBoss(eventIndex) {
        const intro = GAME_CONFIG.producerBossIntroBossIndex || 2;
        if (eventIndex === intro) return true;
        const repeat = GAME_CONFIG.producerBossRepeatEveryBossEvents;
        return Number.isFinite(repeat) && repeat > 0 && eventIndex > intro && (eventIndex - intro) % repeat === 0;
      }

      getNextBossCountdown() {
        return Math.max(0, this.nextBossLevel - this.level);
      }

      getNextScoutCountdown() {
        return Math.max(0, this.nextScoutLevel - this.level);
      }

      spawnBoss(level) {
        if (this.spawnedBossLevels.has(level)) return;
        this.spawnedBossLevels.add(level);
        this.bossSpawnEvents += 1;
        const eventIndex = this.bossSpawnEvents;
        const count = this.getBossSpawnCount(level);
        const includeProducer = this.shouldSpawnProducerBoss(eventIndex);
        const producerCount = includeProducer ? 1 : 0;
        const normalCount = Math.max(0, count - producerCount);
        const mainNest = this.getMainNest();

        for (let i = 0; i < normalCount && this.monsters.length < GAME_CONFIG.maxMonsters; i++) {
          this.spawnMonster("boss", mainNest, { spawnLevel: this.level });
        }
        for (let i = 0; i < producerCount && this.monsters.length < GAME_CONFIG.maxMonsters; i++) {
          this.spawnMonster("producerBoss", mainNest, { spawnLevel: this.level });
        }

        const label = includeProducer
          ? "生产型 Boss 来袭!"
          : count > 1 ? `${count} 个 Boss 来袭!` : "Boss 来袭!";
        this.spawnFloatingText(label, this.nestPosition.x + 58, this.nestPosition.y + 8, includeProducer ? "#9b5de5" : "#ff4d6d", 1.8);
        this.showMessage(includeProducer
          ? `生产型 Boss 来袭！这是第 ${eventIndex} 次 Boss 事件，读条成功会生成一个从零成长的新巢穴。`
          : `Boss 来袭！第 ${level} 级出现 ${count > 1 ? `${count} 个` : ""}强敌，体型和生命会随等级继续成长。`);
      }

      getScoutIntervalForLevel(level) {
        let interval = 6;
        for (const stage of GAME_CONFIG.scoutIntervalStages || []) {
          if (level >= stage.minLevel) interval = stage.interval;
        }
        return Math.max(1, interval);
      }

      getScoutSpawnCount(level) {
        const extraEvery = GAME_CONFIG.scoutExtraCountEveryLevels;
        if (!Number.isFinite(extraEvery) || extraEvery <= 0) return 1;
        const extra = Math.floor(Math.max(0, level - (GAME_CONFIG.scoutFirstLevel || 6)) / extraEvery);
        return clamp(1 + extra, 1, GAME_CONFIG.maxScoutsPerEvent || 1);
      }

      spawnScoutEvent(level) {
        if (this.spawnedScoutLevels.has(level)) return;
        this.spawnedScoutLevels.add(level);
        const count = this.getScoutSpawnCount(level);
        const mainNest = this.getMainNest();
        for (let i = 0; i < count && this.monsters.length < GAME_CONFIG.maxMonsters; i++) {
          this.spawnMonster("scout", mainNest, { spawnLevel: this.level });
        }
        this.spawnFloatingText(count > 1 ? `${count} 个侦查怪` : "侦查怪", mainNest.x + 50, mainNest.y + 30, "#f6e05e", 1.35);
        this.showMessage(`侦查怪出现！它会按 4 方向寻找低伤害折线路径，死亡后在原地留下旗帜。`);
      }

      getSpawnBatchSize(typeKey, level = this.level) {
        const cfg = MONSTER_TYPES[typeKey];
        if (!cfg || cfg.isBoss || cfg.isScout) return 1;
        const levelDelta = Math.max(0, level - (cfg.unlockLevel || 1));
        const batch = 1 + Math.floor(levelDelta / GAME_CONFIG.spawnBatchIncreaseEveryLevels);
        return clamp(batch, 1, GAME_CONFIG.maxSpawnBatchSize);
      }

      updateSpawning(dt) {
        this.updateGeneratedNests(dt);
        for (const nest of this.nests) {
          this.updateNestSpawning(nest, dt);
        }
      }

      updateGeneratedNests(dt) {
        for (const nest of this.nests) {
          if (nest.isMain) continue;
          nest.age += dt;
          nest.pulse += dt * 3;
          nest.localLevel = Math.floor(nest.age / GAME_CONFIG.generatedNestLevelDuration) + 1;
          nest.spawnPower = clamp(nest.age / GAME_CONFIG.generatedNestRampDuration, 0, 1);
        }
      }

      updateNestSpawning(nest, dt) {
        const effectiveLevel = nest.isMain ? this.level : Math.max(1, nest.localLevel || 1);
        const power = nest.isMain ? 1 : nest.spawnPower;
        if (!nest.isMain && power < GAME_CONFIG.generatedNestMinSpawnPower) return;

        for (const [key, cfg] of Object.entries(MONSTER_TYPES)) {
          if (cfg.isBoss || cfg.isScout) continue;
          if (effectiveLevel < cfg.unlockLevel) {
            nest.spawnTimers[key] = 0;
            continue;
          }

          if (this.monsters.length >= GAME_CONFIG.maxMonsters) return;

          const timerScale = nest.isMain ? 1 : Math.max(GAME_CONFIG.generatedNestMinSpawnPower, power);
          nest.spawnTimers[key] = (nest.spawnTimers[key] || 0) + dt * timerScale;
          const interval = this.getAdjustedSpawnInterval(cfg.spawnInterval, effectiveLevel);
          if (nest.spawnTimers[key] >= interval) {
            nest.spawnTimers[key] = 0;
            const baseBatch = this.getSpawnBatchSize(key, effectiveLevel);
            const batchSize = nest.isMain ? baseBatch : Math.max(1, Math.floor(baseBatch * timerScale));
            for (let i = 0; i < batchSize && this.monsters.length < GAME_CONFIG.maxMonsters; i++) {
              this.spawnMonster(key, nest, { spawnLevel: effectiveLevel });
            }
          }
        }
      }

      getAdjustedSpawnInterval(baseInterval, level = this.level) {
        const factor = Math.max(
          GAME_CONFIG.minSpawnIntervalFactor,
          1 - (level - 1) * GAME_CONFIG.spawnIntervalReductionPerLevel
        );
        return baseInterval * factor;
      }

      addGeneratedNest(x, y) {
        const generatedCount = this.nests.filter(nest => !nest.isMain).length;
        if (generatedCount >= GAME_CONFIG.generatedNestMaxCount) {
          let closest = null;
          let bestDistance = Infinity;
          for (const nest of this.nests) {
            if (nest.isMain) continue;
            const d = distanceXY(x, y, nest.x, nest.y);
            if (d < bestDistance) {
              closest = nest;
              bestDistance = d;
            }
          }
          if (closest) {
            closest.spawnPower = Math.min(1, closest.spawnPower + 0.25);
            closest.localLevel += 1;
            this.spawnFloatingText("巢穴强化", closest.x, closest.y - 26, "#ff5c7a", 1.3);
            return closest;
          }
        }
        const nest = this.createNest(
          clamp(x, GAME_CONFIG.monsterRadius, this.worldWidth - GAME_CONFIG.monsterRadius),
          clamp(y, GAME_CONFIG.monsterRadius, this.worldHeight - GAME_CONFIG.monsterRadius),
          false
        );
        this.nests.push(nest);
        return nest;
      }

      completeProducerBoss(monster) {
        if (!monster.alive || !monster.config.isProducerBoss) return;
        const nest = this.addGeneratedNest(monster.x, monster.y);
        monster.die({ noReward: true, productionComplete: true });
        this.spawnFloatingText("新巢穴", nest.x, nest.y - 30, "#ff5c7a", 1.55);
        this.showMessage("生产型 Boss 读条完成并消失：新巢穴已生成，会从零开始逐渐增强！");
      }

      spawnMonster(typeKey, nest = null, options = {}) {
        this.monsters.push(new Monster(this, typeKey, nest || this.getMainNest(), options));
      }

      removeDeadMonsters() {
        this.monsters = this.monsters.filter(monster => monster.alive);
      }

      updateFloatingTexts(dt) {
        for (const item of this.floatingTexts) {
          item.life -= dt;
          item.y -= dt * 32;
        }
        this.floatingTexts = this.floatingTexts.filter(item => item.life > 0);
      }

      updateMessageTimer(dt) {
        if (this.messageTimer === Infinity) return;
        if (this.messageTimer > 0) {
          this.messageTimer -= dt;
          if (this.messageTimer <= 0) {
            if (this.buildModeTowerKey) {
              this.message = `正在放置 ${TOWER_TYPES[this.buildModeTowerKey].name}。`;
              this.messageTimer = Infinity;
            } else if (this.status === GAME_STATUS.RUNNING) {
              const nextBoss = this.getNextBossCountdown();
              const nextScout = this.getNextScoutCountdown();
              this.message = nextBoss <= 0
                ? `Boss 已在本级出现，下一次侦查怪还有 ${nextScout} 级。`
                : `守住宝物，距离下一次 Boss ${nextBoss} 级，侦查怪 ${nextScout} 级。`;
            } else if (this.status === GAME_STATUS.PAUSED) {
              this.message = "游戏已暂停。";
            } else if (this.status === GAME_STATUS.NOT_STARTED) {
              this.message = "选择“开始游戏”，然后购买并放置防御塔。";
            }
          }
        }
      }

      loop(timestamp) {
        const dt = this.lastTimestamp ? Math.min(0.05, (timestamp - this.lastTimestamp) / 1000) : 0;
        this.lastTimestamp = timestamp;
        this.resizeCanvas();
        this.update(dt);
        this.draw();
        requestAnimationFrame((t) => this.loop(t));
      }

      draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.worldWidth, this.worldHeight);
        this.drawBackground(ctx);
        this.drawGridIfNeeded(ctx);
        this.drawOriginMarkers(ctx);
        this.drawGeneratedNests(ctx);
        this.drawFlags(ctx);

        for (const tower of this.towers) {
          tower.draw(ctx, tower === this.selectedTower);
        }
        for (const tower of this.towers) {
          tower.drawLaser(ctx);
        }
        this.treasure.draw(ctx);
        for (const monster of this.monsters) monster.draw(ctx);
        this.drawFloatingTexts(ctx);
        this.drawPlacementPreview(ctx);
        this.drawStatusOverlay(ctx);
      }

      drawBackground(ctx) {
        const gradient = ctx.createLinearGradient(0, 0, this.worldWidth, this.worldHeight);
        gradient.addColorStop(0, "#15233b");
        gradient.addColorStop(0.6, "#0e1728");
        gradient.addColorStop(1, "#101a2e");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, this.worldWidth, this.worldHeight);

        this.drawTerrainCells(ctx);

        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#ffffff";
        for (let row = 0; row < GAME_CONFIG.gridRows; row++) {
          for (let col = 0; col < GAME_CONFIG.gridCols; col++) {
            const p = this.cellCenter(col, row);
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();

        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 3;
        ctx.strokeRect(1.5, 1.5, this.worldWidth - 3, this.worldHeight - 3);
      }

      drawTerrainCells(ctx) {
        const cell = GAME_CONFIG.cellSize;
        ctx.save();
        for (const [key, typeKey] of this.terrainByCell.entries()) {
          const [col, row] = key.split(",").map(Number);
          const terrain = TERRAIN_TYPES[typeKey];
          const x = col * cell;
          const y = row * cell;

          ctx.fillStyle = terrain.fill;
          ctx.fillRect(x + 4, y + 4, cell - 8, cell - 8);
          ctx.strokeStyle = terrain.stroke;
          ctx.lineWidth = 2;
          ctx.setLineDash(terrain.kind === "debuff" ? [8, 6] : []);
          ctx.strokeRect(x + 7, y + 7, cell - 14, cell - 14);
          ctx.setLineDash([]);

          ctx.fillStyle = terrain.color;
          ctx.font = "900 20px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(terrain.icon, x + cell / 2, y + cell / 2 - 3);

          ctx.fillStyle = "rgba(255,255,255,0.76)";
          ctx.font = "800 10px system-ui, sans-serif";
          ctx.fillText(terrain.name, x + cell / 2, y + cell / 2 + 19);
        }
        ctx.restore();
      }

      drawGridIfNeeded(ctx) {
        if (!this.buildModeTowerKey) return;
        ctx.save();
        ctx.lineWidth = 1;
        for (let col = 0; col < GAME_CONFIG.gridCols; col++) {
          for (let row = 0; row < GAME_CONFIG.gridRows; row++) {
            const x = col * GAME_CONFIG.cellSize;
            const y = row * GAME_CONFIG.cellSize;
            const placeable = this.canPlaceTower(col, row);
            ctx.fillStyle = placeable ? "rgba(83, 211, 127, 0.08)" : "rgba(255, 92, 122, 0.10)";
            ctx.fillRect(x, y, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
            ctx.strokeStyle = placeable ? "rgba(255,255,255,0.22)" : "rgba(255,92,122,0.35)";
            ctx.strokeRect(x, y, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
          }
        }
        ctx.restore();
      }

      drawGeneratedNests(ctx) {
        if (!this.nests?.length) return;
        ctx.save();
        for (const nest of this.nests) {
          if (nest.isMain) continue;
          const power = clamp(nest.spawnPower || 0, 0, 1);
          const radius = 18 + power * 18 + Math.sin(nest.pulse || 0) * 2;
          ctx.globalAlpha = 0.2 + power * 0.18;
          ctx.fillStyle = "#ff5c7a";
          ctx.beginPath();
          ctx.arc(nest.x, nest.y, radius + 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.fillStyle = "#ff5c7a";
          ctx.strokeStyle = "#ffe6ee";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(nest.x, nest.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#fff";
          ctx.font = "900 18px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("巢", nest.x, nest.y + 1);
          ctx.fillStyle = "rgba(255,255,255,0.86)";
          ctx.font = "800 10px system-ui, sans-serif";
          ctx.fillText(`Lv.${nest.localLevel} ${Math.round(power * 100)}%`, nest.x, nest.y + radius + 14);
        }
        ctx.restore();
      }

      drawFlags(ctx) {
        if (!this.flags?.length) return;
        ctx.save();
        for (const flag of this.flags) {
          ctx.strokeStyle = "rgba(255,255,255,0.86)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(flag.x, flag.y + 18);
          ctx.lineTo(flag.x, flag.y - 22);
          ctx.stroke();
          ctx.fillStyle = "#ffcf66";
          ctx.strokeStyle = "rgba(80,45,8,0.82)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(flag.x, flag.y - 22);
          ctx.lineTo(flag.x + 28, flag.y - 14);
          ctx.lineTo(flag.x, flag.y - 6);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.font = "900 11px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("旗", flag.x + 10, flag.y - 14);
        }
        ctx.restore();
      }

      drawPlacementPreview(ctx) {
        if (!this.buildModeTowerKey || !this.pointer.active) return;
        const cfg = TOWER_TYPES[this.buildModeTowerKey];
        const cell = this.pointToCell(this.pointer.x, this.pointer.y);
        const center = this.cellCenter(cell.col, cell.row);
        const cost = this.getTowerPlacementCost(this.buildModeTowerKey, cell.col, cell.row);
        const canPlace = this.canPlaceTower(cell.col, cell.row) && this.gold >= cost;
        const terrain = this.getTerrainAtCell(cell.col, cell.row);
        const effects = this.getTerrainTowerEffects(cell.col, cell.row);
        const previewRange = cfg.isTrap
          ? Math.max(0, (cfg.lureRange || 0) * (effects.rangeMultiplier || 1) + (effects.rangeBonus || 0))
          : Math.max(0, cfg.range * (effects.rangeMultiplier || 1) + (effects.rangeBonus || 0));

        ctx.save();
        ctx.globalAlpha = canPlace ? 0.86 : 0.45;
        ctx.fillStyle = canPlace ? "rgba(83,211,127,0.16)" : "rgba(255,92,122,0.18)";
        ctx.fillRect(cell.col * GAME_CONFIG.cellSize, cell.row * GAME_CONFIG.cellSize, GAME_CONFIG.cellSize, GAME_CONFIG.cellSize);
        ctx.strokeStyle = canPlace ? "#53d37f" : "#ff5c7a";
        ctx.lineWidth = 3;
        ctx.strokeRect(cell.col * GAME_CONFIG.cellSize + 1.5, cell.row * GAME_CONFIG.cellSize + 1.5, GAME_CONFIG.cellSize - 3, GAME_CONFIG.cellSize - 3);

        if (previewRange > 0) {
          ctx.globalAlpha = 0.16;
          ctx.fillStyle = terrain?.color || cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, previewRange, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = terrain?.color || cfg.color;
          ctx.beginPath();
          ctx.arc(center.x, center.y, previewRange, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(8, 13, 24, 0.78)";
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 1;
        const labelW = 150;
        const labelH = terrain ? 48 : 32;
        const labelX = clamp(center.x - labelW / 2, 8, this.worldWidth - labelW - 8);
        const labelY = clamp(center.y - GAME_CONFIG.cellSize * 0.75, 8, this.worldHeight - labelH - 8);
        ctx.beginPath();
        ctx.roundRect(labelX, labelY, labelW, labelH, 9);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = canPlace ? "#dfffe8" : "#ffd6df";
        ctx.font = "800 12px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(`花费 ${cost} 金`, labelX + labelW / 2, labelY + 14);
        if (terrain) {
          ctx.fillStyle = terrain.color;
          ctx.font = "800 11px system-ui, sans-serif";
          ctx.fillText(`${terrain.name}：${terrain.description}`, labelX + labelW / 2, labelY + 34);
        }
        ctx.restore();
      }

      drawOriginMarkers(ctx) {
        const nest = this.nestPosition;
        const treasureOrigin = this.treasure.origin;
        const cell = GAME_CONFIG.cellSize;

        ctx.save();
        ctx.fillStyle = "rgba(255,92,122,0.16)";
        ctx.fillRect(0, 0, cell, cell);
        ctx.strokeStyle = "rgba(255,92,122,0.78)";
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, cell - 4, cell - 4);
        ctx.fillStyle = "#ff5c7a";
        ctx.beginPath();
        ctx.arc(nest.x, nest.y, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "900 20px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("巢", nest.x, nest.y + 1);

        ctx.fillStyle = "rgba(255,209,102,0.14)";
        ctx.fillRect((GAME_CONFIG.gridCols - 1) * cell, (GAME_CONFIG.gridRows - 1) * cell, cell, cell);
        ctx.strokeStyle = "rgba(255,209,102,0.78)";
        ctx.strokeRect((GAME_CONFIG.gridCols - 1) * cell + 2, (GAME_CONFIG.gridRows - 1) * cell + 2, cell - 4, cell - 4);

        if (!this.treasure.isAtOrigin()) {
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = "800 13px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("初始点", treasureOrigin.x, treasureOrigin.y);
        }
        ctx.restore();
      }

      drawFloatingTexts(ctx) {
        ctx.save();
        ctx.font = "900 18px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (const item of this.floatingTexts) {
          ctx.globalAlpha = clamp(item.life / item.maxLife, 0, 1);
          ctx.fillStyle = item.color;
          ctx.shadowColor = "rgba(0,0,0,0.55)";
          ctx.shadowBlur = 5;
          ctx.fillText(item.text, item.x, item.y);
        }
        ctx.restore();
      }

      drawStatusOverlay(ctx) {
        if (this.status === GAME_STATUS.RUNNING) return;

        const textMap = {
          [GAME_STATUS.NOT_STARTED]: "点击开始游戏",
          [GAME_STATUS.PAUSED]: "游戏暂停",
          [GAME_STATUS.FAILED]: "游戏失败"
        };

        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.36)";
        ctx.fillRect(0, 0, this.worldWidth, this.worldHeight);

        ctx.fillStyle = "rgba(15, 24, 40, 0.88)";
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 2;
        const boxW = Math.min(420, this.worldWidth - 70);
        const boxH = 142;
        const boxX = (this.worldWidth - boxW) / 2;
        const boxY = (this.worldHeight - boxH) / 2;
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 18);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = this.status === GAME_STATUS.FAILED ? "#ff5c7a" : "#ffd166";
        ctx.font = "900 34px system-ui, sans-serif";
        ctx.fillText(textMap[this.status], this.worldWidth / 2, boxY + 50);

        ctx.fillStyle = "#dce7f7";
        ctx.font = "700 16px system-ui, sans-serif";
        const sub = this.status === GAME_STATUS.FAILED
          ? `最终等级 ${this.level} · 历史最高 ${this.bestLevel}`
          : "购买防御塔，阻止怪物搬回宝物";
        ctx.fillText(sub, this.worldWidth / 2, boxY + 88);
        ctx.fillStyle = "rgba(220,231,247,0.72)";
        ctx.font = "600 13px system-ui, sans-serif";
        ctx.fillText("电脑鼠标 / 手机触摸均可操作", this.worldWidth / 2, boxY + 114);
        ctx.restore();
      }
    }
    // =========================
    // 8. 独立绘制函数
    // =========================
    function drawTreasureShape(ctx, x, y, radius, dropped = false, ghost = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowColor = "rgba(255, 209, 102, 0.55)";
      ctx.shadowBlur = ghost ? 4 : 12;
      ctx.fillStyle = dropped ? "#ffb703" : "#ffd166";
      ctx.strokeStyle = ghost ? "rgba(255,255,255,0.45)" : "#fff6cc";
      ctx.lineWidth = ghost ? 1.5 : 2.5;
      ctx.beginPath();
      ctx.moveTo(0, -radius);
      ctx.lineTo(radius * 0.82, -radius * 0.15);
      ctx.lineTo(radius * 0.52, radius * 0.92);
      ctx.lineTo(-radius * 0.52, radius * 0.92);
      ctx.lineTo(-radius * 0.82, -radius * 0.15);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      if (dropped && !ghost) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "900 12px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("!", 0, 1);
      }
      ctx.restore();
    }

    // Canvas roundRect 兼容性兜底：现代浏览器已支持，这里防止极老环境报错。
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        this.moveTo(x + radius, y);
        this.lineTo(x + w - radius, y);
        this.quadraticCurveTo(x + w, y, x + w, y + radius);
        this.lineTo(x + w, y + h - radius);
        this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        this.lineTo(x + radius, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - radius);
        this.lineTo(x, y + radius);
        this.quadraticCurveTo(x, y, x + radius, y);
        return this;
      };
    }

    window.addEventListener("DOMContentLoaded", () => {
      new Game();
    });
  </script>
